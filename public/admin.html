<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Edición y Matriculación de Curso</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen p-6">

  <div class="max-w-3xl mx-auto bg-white p-6 rounded shadow">
    <h1 class="text-2xl font-bold mb-4">Editar Curso</h1>
    <form id="editCourseForm" class="space-y-4">
      <div>
        <label for="courseName" class="block font-semibold mb-1">Nombre del Curso</label>
        <input type="text" id="courseName" name="courseName" class="w-full border rounded px-3 py-2" placeholder="Ingrese nombre del curso" required />
      </div>
      <div>
        <label for="courseDesc" class="block font-semibold mb-1">Descripción</label>
        <textarea id="courseDesc" name="courseDesc" rows="3" class="w-full border rounded px-3 py-2" placeholder="Descripción del curso" required></textarea>
      </div>
      <div class="flex space-x-4">
        <div>
          <label for="startDate" class="block font-semibold mb-1">Fecha de inicio</label>
          <input type="date" id="startDate" name="startDate" class="border rounded px-3 py-2" required />
        </div>
        <div>
          <label for="endDate" class="block font-semibold mb-1">Fecha de fin</label>
          <input type="date" id="endDate" name="endDate" class="border rounded px-3 py-2" required />
        </div>
      </div>
      <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">Guardar Cambios</button>
    </form>

    <hr class="my-6" />

    <button id="openEnrollPanel" class="bg-green-600 text-white px-4 py-2 rounded hover:bg-green-700">
      Matricular Usuarios
    </button>
  </div>

  <!-- Panel lateral para matricular usuarios -->
  <div id="enrollPanel" class="fixed top-0 right-0 h-full w-96 bg-white shadow-lg transform translate-x-full transition-transform duration-300 flex flex-col">
    <div class="p-4 border-b flex justify-between items-center">
      <h2 class="text-xl font-bold">Matricular Usuarios</h2>
      <button id="closeEnrollPanel" class="text-gray-600 hover:text-gray-900">&times;</button>
    </div>
    <div class="p-4 flex-grow overflow-auto">
      <p class="mb-2">Seleccione usuarios para matricular:</p>
      <ul id="userList" class="space-y-2 max-h-[60vh] overflow-auto">
        <!-- Usuarios se agregarán dinámicamente aquí -->
      </ul>
    </div>
    <div class="p-4 border-t flex justify-end">
      <button id="confirmEnroll" class="bg-green-600 text-white px-4 py-2 rounded hover:bg-green-700 disabled:opacity-50" disabled>
        Confirmar Matrícula
      </button>
    </div>
  </div>

  <script>
    // Datos de ejemplo: usuarios ya matriculados y todos los usuarios disponibles
    const enrolledUsers = [2, 4]; // IDs de usuarios matriculados en el curso
    const allUsers = [
      { id: 1, name: "Ana Pérez" },
      { id: 2, name: "Carlos Gómez" },
      { id: 3, name: "María Rodríguez" },
      { id: 4, name: "Luis Fernández" },
      { id: 5, name: "Elena Martínez" }
    ];

    // Referencias DOM
    const enrollPanel = document.getElementById('enrollPanel');
    const openEnrollBtn = document.getElementById('openEnrollPanel');
    const closeEnrollBtn = document.getElementById('closeEnrollPanel');
    const userList = document.getElementById('userList');
    const confirmEnrollBtn = document.getElementById('confirmEnroll');
    const editCourseForm = document.getElementById('editCourseForm');

    // Estado
    let selectedUsersToEnroll = new Set();

    // Función para abrir panel lateral
    function openPanel() {
      enrollPanel.classList.remove('translate-x-full');
      populateUserList();
    }

    // Función para cerrar panel lateral
    function closePanel() {
      enrollPanel.classList.add('translate-x-full');
      selectedUsersToEnroll.clear();
      updateConfirmButton();
    }

    // Filtrar usuarios no matriculados
    function getUsersNotEnrolled() {
      return allUsers.filter(u => !enrolledUsers.includes(u.id));
    }

    // Rellenar lista con usuarios no matriculados
    function populateUserList() {
      userList.innerHTML = '';
      const users = getUsersNotEnrolled();
      if (users.length === 0) {
        userList.innerHTML = '<li class="text-gray-500">No hay usuarios disponibles para matricular.</li>';
        confirmEnrollBtn.disabled = true;
        return;
      }
      users.forEach(user => {
        const li = document.createElement('li');
        li.className = "flex items-center justify-between border rounded p-2";
        li.innerHTML = `
          <span>${user.name}</span>
          <input type="checkbox" data-userid="${user.id}" />
        `;
        userList.appendChild(li);
      });

      // Añadir evento a checkboxes
      userList.querySelectorAll('input[type="checkbox"]').forEach(cb => {
        cb.addEventListener('change', (e) => {
          const userId = parseInt(e.target.dataset.userid);
          if (e.target.checked) {
            selectedUsersToEnroll.add(userId);
          } else {
            selectedUsersToEnroll.delete(userId);
          }
          updateConfirmButton();
        });
      });

      updateConfirmButton();
    }

    // Actualiza el estado del botón confirmar
    function updateConfirmButton() {
      confirmEnrollBtn.disabled = selectedUsersToEnroll.size === 0;
    }

    // Evento botón abrir panel
    openEnrollBtn.addEventListener('click', openPanel);
    // Evento botón cerrar panel
    closeEnrollBtn.addEventListener('click', closePanel);

    // Evento confirmar matrícula
    confirmEnrollBtn.addEventListener('click', () => {
      if (selectedUsersToEnroll.size === 0) return;

      // Aquí conectarías con backend para guardar matrícula
      // Por ahora, actualizamos el array enrolledUsers y cerramos el panel
      selectedUsersToEnroll.forEach(id => enrolledUsers.push(id));
      alert(`Usuarios matriculados: ${[...selectedUsersToEnroll].map(id => allUsers.find(u => u.id === id).name).join(', ')}`);

      selectedUsersToEnroll.clear();
      closePanel();
    });

    // Evento para formulario edición curso
    editCourseForm.addEventListener('submit', (e) => {
      e.preventDefault();

      const formData = new FormData(editCourseForm);
      const data = {
        name: formData.get('courseName').trim(),
        description: formData.get('courseDesc').trim(),
        startDate: formData.get('startDate'),
        endDate: formData.get('endDate'),
      };

      if (!data.name || !data.description || !data.startDate || !data.endDate) {
        alert('Por favor completa todos los campos.');
        return;
      }

      if (data.endDate < data.startDate) {
        alert('La fecha de fin debe ser posterior a la fecha de inicio.');
        return;
      }

      // Aquí conectarías con backend para guardar cambios del curso
      console.log('Datos a guardar:', data);
      alert('Curso actualizado correctamente.');

      // Opcional: limpiar formulario o actualizar vista
    });

    // Opcional: precargar datos en el formulario (ejemplo)
    function preloadCourse() {
      // Simulamos que cargamos datos del curso para editar
      editCourseForm.courseName.value = "Curso de Programación";
      editCourseForm.courseDesc.value = "Aprende fundamentos de programación en varios lenguajes.";
      editCourseForm.startDate.value = "2025-07-01";
      editCourseForm.endDate.value = "2025-08-31";
    }
    preloadCourse();

  </script>
</body>
</html>
