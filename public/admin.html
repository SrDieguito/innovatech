<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel de Administración de Cursos</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>
<body class="bg-gray-100">
  <div class="container mx-auto p-4">
    <h1 class="text-2xl font-bold mb-6">Panel de Administración de Cursos</h1>
    
    <!-- Pestañas -->
    <div class="flex border-b mb-6">
      <button class="tab-button px-4 py-2 font-semibold border-b-2 border-blue-500 text-blue-600" data-tab="crear-curso">Crear Curso</button>
      <button class="tab-button px-4 py-2 font-semibold text-gray-600" data-tab="gestion-cursos">Gestión de Cursos</button>
    </div>

    <!-- Pestaña Crear Curso -->
    <div id="crear-curso" class="tab-content bg-white p-6 rounded-lg shadow">
      <div class="mb-4">
        <label class="block text-gray-700 font-semibold mb-2">Nombre del Curso</label>
        <input type="text" id="nombre-curso" class="w-full p-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>
      
      <div class="mb-4">
        <label class="block text-gray-700 font-semibold mb-2">Descripción</label>
        <textarea id="descripcion-curso" class="w-full p-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" rows="3"></textarea>
      </div>
      
      <div class="mb-4">
        <label class="block text-gray-700 font-semibold mb-2">Profesor Tutor</label>
        <select id="profesor-curso" class="w-full p-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
          <option value="">Seleccione un profesor</option>
        </select>
      </div>
      
      <div class="mb-6">
        <label class="block text-gray-700 font-semibold mb-2">Lista de Estudiantes (Excel)</label>
        <input type="file" id="archivo-excel" accept=".xlsx, .xls" class="w-full p-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
        <p class="text-sm text-gray-500 mt-1">El archivo Excel debe contener una columna con el email de los estudiantes</p>
      </div>
      
      <div class="flex justify-end">
        <button id="crear-curso-btn" class="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-4 rounded-lg transition duration-200">
          Crear Curso
        </button>
      </div>
    </div>

    <!-- Pestaña Gestión de Cursos -->
    <div id="gestion-cursos" class="tab-content bg-white p-6 rounded-lg shadow hidden">
      <div class="mb-6 flex justify-between items-center">
        <div class="w-1/2">
          <input type="text" id="buscar-curso" placeholder="Buscar curso por nombre..." class="w-full p-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <button id="recargar-cursos" class="bg-gray-200 hover:bg-gray-300 text-gray-800 font-semibold py-2 px-4 rounded-lg transition duration-200">
          Recargar
        </button>
      </div>
      
      <div id="lista-cursos" class="space-y-4">
        <!-- Los cursos se cargarán aquí dinámicamente -->
        <div class="text-center py-4 text-gray-500">Cargando cursos...</div>
      </div>
    </div>
  </div>

  <!-- Modal para gestión de estudiantes -->
  <div id="estudiantes-modal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center p-4 z-50">
    <div class="bg-white rounded-lg shadow-xl w-full max-w-2xl max-h-[90vh] flex flex-col">
      <div class="p-6 border-b">
        <h3 class="text-xl font-semibold text-gray-800">Estudiantes Matriculados</h3>
      </div>
      
      <div class="p-6 border-b">
        <div class="mb-4">
          <input type="text" id="buscar-estudiante" placeholder="Buscar estudiante por nombre o email..." class="w-full p-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        
        <div class="flex justify-between items-center mb-2">
          <span id="contador-estudiantes" class="text-sm text-gray-600">0 estudiantes</span>
          <button id="matricular-manual" class="text-sm text-blue-600 hover:text-blue-800">Matricular manualmente</button>
        </div>
        
        <div id="lista-estudiantes" class="border rounded-lg overflow-hidden max-h-60 overflow-y-auto">
          <div class="text-center py-4 text-gray-500">Cargando estudiantes...</div>
        </div>
      </div>
      
      <div class="p-4 bg-gray-50 flex justify-between">
        <button id="cerrar-modal" class="bg-gray-300 hover:bg-gray-400 text-gray-800 font-semibold py-2 px-4 rounded-lg transition duration-200">
          Cerrar
        </button>
        <button id="desmatricular-btn" class="bg-red-600 hover:bg-red-700 text-white font-semibold py-2 px-4 rounded-lg transition duration-200 hidden">
          Desmatricular Seleccionados
        </button>
      </div>
    </div>
  </div>

  <!-- Modal para matricular manualmente -->
  <div id="matricular-modal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center p-4 z-50">
    <div class="bg-white rounded-lg shadow-xl w-full max-w-md max-h-[90vh] flex flex-col">
      <div class="p-6 border-b">
        <h3 class="text-xl font-semibold text-gray-800">Matricular Estudiante</h3>
      </div>
      
      <div class="p-6 border-b">
        <div class="mb-4">
          <label class="block text-gray-700 font-semibold mb-2">Email del Estudiante</label>
          <input type="email" id="email-estudiante" placeholder="ejemplo@email.com" class="w-full p-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
      </div>
      
      <div class="p-4 bg-gray-50 flex justify-end space-x-2">
        <button id="cancelar-matricular" class="bg-gray-300 hover:bg-gray-400 text-gray-800 font-semibold py-2 px-4 rounded-lg transition duration-200">
          Cancelar
        </button>
        <button id="confirmar-matricular" class="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-4 rounded-lg transition duration-200">
          Matricular
        </button>
      </div>
    </div>
  </div>

  <script>
    // Variables globales
    let cursoActivo = null;
    let estudiantesCargados = [];
    let todosEstudiantes = [];
    let todosCursos = [];

    // Funciones auxiliares
    function mostrarError(mensaje) {
      alert(`Error: ${mensaje}`);
    }

    function mostrarExito(mensaje) {
      alert(`Éxito: ${mensaje}`);
    }

    // Funciones para manejar pestañas
    document.querySelectorAll('.tab-button').forEach(button => {
      button.addEventListener('click', () => {
        // Actualizar apariencia de los botones de pestaña
        document.querySelectorAll('.tab-button').forEach(btn => {
          btn.classList.remove('border-b-2', 'border-blue-500', 'text-blue-600');
          btn.classList.add('text-gray-600');
        });
        button.classList.add('border-b-2', 'border-blue-500', 'text-blue-600');
        button.classList.remove('text-gray-600');
        
        // Mostrar el contenido de la pestaña seleccionada
        document.querySelectorAll('.tab-content').forEach(content => {
          content.classList.add('hidden');
        });
        document.getElementById(button.dataset.tab).classList.remove('hidden');
      });
    });

    // Cargar profesores al iniciar
    async function cargarProfesores() {
      try {
        const response = await fetch('/api/cursos/profesores');
        if (!response.ok) throw new Error('Error al cargar profesores');
        
        const profesores = await response.json();
        const select = document.getElementById('profesor-curso');
        
        // Limpiar opciones excepto la primera
        while (select.options.length > 1) {
          select.remove(1);
        }
        
        // Agregar profesores
        profesores.forEach(profesor => {
          const option = document.createElement('option');
          option.value = profesor.id;
          option.textContent = profesor.nombre;
          select.appendChild(option);
        });
      } catch (error) {
        console.error(error);
        mostrarError('No se pudieron cargar los profesores');
      }
    }

    // Cargar cursos
    async function cargarCursos(busqueda = '') {
      try {
        const listaCursos = document.getElementById('lista-cursos');
        listaCursos.innerHTML = '<div class="text-center py-4 text-gray-500">Cargando cursos...</div>';
        
        const response = await fetch('/api/cursos');
        if (!response.ok) throw new Error('Error al cargar cursos');
        
        todosCursos = await response.json();
        
        // Filtrar si hay búsqueda
        const cursosFiltrados = busqueda 
          ? todosCursos.filter(curso => 
              curso.nombre.toLowerCase().includes(busqueda.toLowerCase()))
          : todosCursos;
        
        // Mostrar cursos
        if (cursosFiltrados.length === 0) {
          listaCursos.innerHTML = '<div class="text-center py-4 text-gray-500">No se encontraron cursos</div>';
          return;
        }
        
        listaCursos.innerHTML = '';
        cursosFiltrados.forEach(curso => {
          const cursoElement = document.createElement('div');
          cursoElement.className = 'border border-gray-200 p-4 rounded-lg hover:bg-gray-50 transition duration-200';
          cursoElement.innerHTML = `
            <div class="flex justify-between items-start">
              <div>
                <h3 class="font-semibold text-lg text-gray-800">${curso.nombre}</h3>
                <p class="text-gray-600 mt-1">${curso.descripcion || 'Sin descripción'}</p>
                <div class="flex items-center mt-2 text-sm text-gray-500">
                  <span class="mr-3">Profesor: ${curso.profesor_nombre}</span>
                  <span>Estudiantes: ${curso.num_estudiantes || 0}</span>
                </div>
              </div>
              <div class="flex space-x-2">
                <button class="ver-estudiantes bg-blue-100 hover:bg-blue-200 text-blue-800 font-medium py-1 px-3 rounded text-sm" data-curso="${curso.id}">
                  Estudiantes
                </button>
                <button class="editar-curso bg-yellow-100 hover:bg-yellow-200 text-yellow-800 font-medium py-1 px-3 rounded text-sm" data-curso="${curso.id}">
                  Editar
                </button>
              </div>
            </div>
          `;
          listaCursos.appendChild(cursoElement);
        });
        
        // Agregar eventos a los botones
        document.querySelectorAll('.ver-estudiantes').forEach(btn => {
          btn.addEventListener('click', () => verEstudiantes(btn.dataset.curso));
        });
        
        document.querySelectorAll('.editar-curso').forEach(btn => {
          btn.addEventListener('click', () => editarCurso(btn.dataset.curso));
        });
      } catch (error) {
        console.error(error);
        mostrarError('No se pudieron cargar los cursos');
      }
    }

    // Ver estudiantes de un curso
    async function verEstudiantes(cursoId) {
      cursoActivo = cursoId;
      
      try {
        const modal = document.getElementById('estudiantes-modal');
        const lista = document.getElementById('lista-estudiantes');
        const desmatricularBtn = document.getElementById('desmatricular-btn');
        
        lista.innerHTML = '<div class="text-center py-4 text-gray-500">Cargando estudiantes...</div>';
        desmatricularBtn.classList.add('hidden');
        
        const response = await fetch(`/api/cursos/${cursoId}/estudiantes`);
        if (!response.ok) throw new Error('Error al cargar estudiantes');
        
        todosEstudiantes = await response.json();
        actualizarListaEstudiantes(todosEstudiantes);
        
        modal.classList.remove('hidden');
      } catch (error) {
        console.error(error);
        mostrarError('No se pudieron cargar los estudiantes');
      }
    }

    // Actualizar lista de estudiantes en el modal
    function actualizarListaEstudiantes(estudiantes) {
      const lista = document.getElementById('lista-estudiantes');
      const contador = document.getElementById('contador-estudiantes');
      const desmatricularBtn = document.getElementById('desmatricular-btn');
      
      if (estudiantes.length === 0) {
        lista.innerHTML = '<div class="text-center py-4 text-gray-500">No hay estudiantes matriculados</div>';
        contador.textContent = '0 estudiantes';
        desmatricularBtn.classList.add('hidden');
        return;
      }
      
      lista.innerHTML = '';
      estudiantes.forEach(estudiante => {
        const estudianteElement = document.createElement('div');
        estudianteElement.className = 'flex items-center p-3 border-b hover:bg-gray-50';
        estudianteElement.innerHTML = `
          <input type="checkbox" class="mr-3 estudiante-checkbox" value="${estudiante.id}">
          <div class="flex-1">
            <div class="font-medium text-gray-800">${estudiante.nombre}</div>
            <div class="text-sm text-gray-500">${estudiante.email}</div>
          </div>
        `;
        lista.appendChild(estudianteElement);
      });
      
      contador.textContent = `${estudiantes.length} estudiante${estudiantes.length !== 1 ? 's' : ''}`;
      
      // Mostrar botón de desmatricular
      desmatricularBtn.classList.remove('hidden');
    }

    // Filtrar estudiantes
    document.getElementById('buscar-estudiante').addEventListener('input', (e) => {
      const busqueda = e.target.value.toLowerCase();
      const estudiantesFiltrados = busqueda 
        ? todosEstudiantes.filter(est => 
            est.nombre.toLowerCase().includes(busqueda) || 
            est.email.toLowerCase().includes(busqueda))
        : todosEstudiantes;
      
      actualizarListaEstudiantes(estudiantesFiltrados);
    });

    // Desmatricular estudiantes
    document.getElementById('desmatricular-btn').addEventListener('click', async () => {
      const seleccionados = Array.from(document.querySelectorAll('.estudiante-checkbox:checked'))
        .map(cb => cb.value);
      
      if (seleccionados.length === 0) {
        mostrarError('Seleccione al menos un estudiante');
        return;
      }
      
      try {
        const response = await fetch(`/api/cursos/${cursoActivo}/estudiantes`, {
          method: 'DELETE',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ estudiantes: seleccionados })
        });
        
        if (!response.ok) throw new Error('Error al desmatricular');
        
        mostrarExito('Estudiantes desmatriculados correctamente');
        await verEstudiantes(cursoActivo);
      } catch (error) {
        console.error(error);
        mostrarError('Error al desmatricular estudiantes');
      }
    });

    // Cerrar modal
    document.getElementById('cerrar-modal').addEventListener('click', () => {
      document.getElementById('estudiantes-modal').classList.add('hidden');
    });

    // Matricular manualmente
    document.getElementById('matricular-manual').addEventListener('click', () => {
      document.getElementById('matricular-modal').classList.remove('hidden');
      document.getElementById('email-estudiante').focus();
    });

    document.getElementById('cancelar-matricular').addEventListener('click', () => {
      document.getElementById('matricular-modal').classList.add('hidden');
      document.getElementById('email-estudiante').value = '';
    });

    document.getElementById('confirmar-matricular').addEventListener('click', async () => {
      const email = document.getElementById('email-estudiante').value.trim();
      
      if (!email) {
        mostrarError('Ingrese un email válido');
        return;
      }
      
      try {
        const response = await fetch(`/api/cursos/${cursoActivo}/estudiantes`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ estudiantes: [email] })
        });
        
        if (!response.ok) {
          const errorData = await response.json();
          throw new Error(errorData.error || 'Error al matricular');
        }
        
        mostrarExito('Estudiante matriculado correctamente');
        document.getElementById('matricular-modal').classList.add('hidden');
        document.getElementById('email-estudiante').value = '';
        await verEstudiantes(cursoActivo);
      } catch (error) {
        console.error(error);
        mostrarError(error.message || 'Error al matricular estudiante');
      }
    });

    // Procesar archivo Excel
    document.getElementById('archivo-excel').addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      
      try {
        const formData = new FormData();
        formData.append('archivo', file);
        
        const response = await fetch('/api/cursos/procesar-excel', {
          method: 'POST',
          body: formData
        });
        
        if (!response.ok) throw new Error('Error al procesar el archivo');
        
        const data = await response.json();
        estudiantesCargados = data.estudiantes;
        mostrarExito(`Se cargaron ${estudiantesCargados.length} estudiantes desde el archivo`);
      } catch (error) {
        console.error(error);
        mostrarError('Error al procesar el archivo Excel');
      }
    });

    // Crear nuevo curso
    document.getElementById('crear-curso-btn').addEventListener('click', async () => {
      const nombre = document.getElementById('nombre-curso').value.trim();
      const descripcion = document.getElementById('descripcion-curso').value.trim();
      const profesorId = document.getElementById('profesor-curso').value;
      
      if (!nombre) {
        mostrarError('El nombre del curso es requerido');
        return;
      }
      
      if (!profesorId) {
        mostrarError('Debe seleccionar un profesor');
        return;
      }
      
      try {
        // Crear el curso
        const response = await fetch('/api/cursos', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ nombre, descripcion, profesor_id: profesorId })
        });
        
        if (!response.ok) throw new Error('Error al crear curso');
        
        const curso = await response.json();
        
        // Matricular estudiantes si hay archivo cargado
        if (estudiantesCargados.length > 0) {
          const matricularResponse = await fetch(`/api/cursos/${curso.id}/estudiantes`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ estudiantes: estudiantesCargados })
          });
          
          if (!matricularResponse.ok) throw new Error('Curso creado pero error al matricular estudiantes');
        }
        
        mostrarExito('Curso creado exitosamente');
        
        // Limpiar formulario
        document.getElementById('nombre-curso').value = '';
        document.getElementById('descripcion-curso').value = '';
        document.getElementById('profesor-curso').value = '';
        document.getElementById('archivo-excel').value = '';
        estudiantesCargados = [];
        
        // Recargar lista de cursos
        await cargarCursos();
        
        // Cambiar a pestaña de gestión
        document.querySelector('[data-tab="gestion-cursos"]').click();
      } catch (error) {
        console.error(error);
        mostrarError(error.message || 'Error al crear el curso');
      }
    });

    // Buscar cursos
    document.getElementById('buscar-curso').addEventListener('input', (e) => {
      cargarCursos(e.target.value);
    });

    // Recargar cursos
    document.getElementById('recargar-cursos').addEventListener('click', () => {
      document.getElementById('buscar-curso').value = '';
      cargarCursos();
    });

    // Inicializar
    document.addEventListener('DOMContentLoaded', async () => {
      await cargarProfesores();
      await cargarCursos();
    });
  </script>
</body>
</html>
