<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Administración</title>
    <link rel="stylesheet" href="/css/admin.css">
</head>
<body>
    <header>
        <nav>
            <ul>
                <li><a href="#usuarios" class="active" onclick="mostrarUsuarios('pendiente')">Usuarios</a></li>
            </ul>
        </nav>
    </header>
    
    <main>
        <section id="usuarios">
            <h2>Usuarios</h2>
            <div class="filtros">
                <button onclick="obtenerUsuarios('pendiente')">Pendientes</button>
                <button onclick="obtenerUsuarios('aprobado')">Aprobados</button>
                <button onclick="obtenerUsuarios('rechazado')">Rechazados</button>
            </div>
            <div id="contenedor-usuarios">
                <!-- Aquí se insertarán los usuarios dinámicamente -->
            </div>
        </section>
    </main>
    
    <script>
        async function obtenerUsuarios(estado) {
            try {
                const response = await fetch(`/api/admin?estado=${estado}`);
                const data = await response.json();
                const contenedor = document.getElementById("contenedor-usuarios");
                if (!contenedor) return;
                contenedor.innerHTML = "";
                
                data.forEach(usuario => {
                    const div = document.createElement("div");
                    div.classList.add("usuario-card");
                    div.innerHTML = `
                        <h3>${usuario.nombre}</h3>
                        <p><strong>Email:</strong> ${usuario.email}</p>
                        <button onclick="actualizarEstado(${usuario.id}, 'aprobar')">Aprobar</button>
                        <button onclick="actualizarEstado(${usuario.id}, 'rechazar')">Rechazar</button>
                    `;
                    contenedor.appendChild(div);
                });
            } catch (error) {
                console.error("Error obteniendo usuarios:", error);
            }
        }

        async function actualizarEstado(id, accion) {
            try {
                await fetch(`/api/admin`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ id, accion })
                });
                obtenerUsuarios("pendiente");
            } catch (error) {
                console.error(`Error al ${accion} usuario:`, error);
            }
        }

        document.addEventListener("DOMContentLoaded", () => {
            obtenerUsuarios("pendiente");
        });
    </script>
</body>
</html>
