<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Panel de Administración Moodle</title>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
  <script defer src="/script.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 text-gray-900">
  <div class="container mx-auto p-4">
    <h1 class="text-2xl font-bold mb-4">Panel de Administración</h1>

    <!-- Tabs -->
    <div class="mb-6">
      <button onclick="mostrarSeccion('crear')" class="px-4 py-2 bg-blue-600 text-white rounded">Crear Curso</button>
      <button onclick="mostrarSeccion('ver')" class="px-4 py-2 bg-green-600 text-white rounded ml-2">Ver Cursos</button>
    </div>

    <!-- Crear curso -->
    <div id="crear" class="hidden">
      <div class="bg-white p-6 rounded shadow">
        <h2 class="text-xl font-semibold mb-4">Crear Curso</h2>
        <form id="form-curso" class="space-y-4">
          <div>
            <label class="block">Nombre del curso</label>
            <input type="text" id="nombre" class="w-full border p-2 rounded">
          </div>
          <div>
            <label class="block">Descripción</label>
            <textarea id="descripcion" class="w-full border p-2 rounded"></textarea>
          </div>
          <div>
            <label class="block">Profesor Tutor</label>
            <select id="profesor" class="w-full border p-2 rounded"></select>
          </div>
          <div>
            <label class="block">Lista de Estudiantes (Excel)</label>
            <input type="file" id="archivo-excel" accept=".xlsx, .xls" class="w-full border p-2 rounded" />
          </div>
          <button type="submit" class="bg-blue-500 text-white px-4 py-2 rounded">Crear Curso</button>
        </form>
      </div>
    </div>

    <!-- Ver cursos -->
    <div id="ver" class="hidden">
      <div class="bg-white p-6 rounded shadow">
        <h2 class="text-xl font-semibold mb-4">Cursos Creados</h2>
        <div id="lista-cursos" class="space-y-4"></div>
      </div>
    </div>
  </div>

  <script>
    function mostrarSeccion(id) {
      document.getElementById('crear').classList.add('hidden');
      document.getElementById('ver').classList.add('hidden');
      document.getElementById(id).classList.remove('hidden');
    }

    // /public/script.js

let windowEstudiantes = [];
let windowCursoActivo = null;

function mostrarSeccion(id) {
  document.getElementById('crear').classList.add('hidden');
  document.getElementById('ver').classList.add('hidden');
  document.getElementById(id).classList.remove('hidden');

  if (id === 'ver') cargarCursos();
  if (id === 'crear') cargarProfesores();
}

async function cargarProfesores() {
  const res = await fetch('/api/cursos?action=profesores');
  const data = await res.json();
  const select = document.getElementById('profesor');
  select.innerHTML = data.map(p => `<option value="${p.id}">${p.nombre}</option>`).join('');
}

// Leer Excel
const inputExcel = document.getElementById('archivo-excel');
inputExcel.addEventListener('change', (e) => {
  const file = e.target.files[0];
  const reader = new FileReader();
  reader.onload = (event) => {
    const data = new Uint8Array(event.target.result);
    const workbook = XLSX.read(data, { type: 'array' });
    const sheet = workbook.Sheets[workbook.SheetNames[0]];
    const json = XLSX.utils.sheet_to_json(sheet);
    windowEstudiantes = json.map(e => ({ nombre: e.nombre || e.Nombre, email: e.email || e.Email }));
  };
  reader.readAsArrayBuffer(file);
});

// Crear curso
const formCurso = document.getElementById('form-curso');
formCurso.addEventListener('submit', async (e) => {
  e.preventDefault();
  const nombre = document.getElementById('nombre').value;
  const descripcion = document.getElementById('descripcion').value;
  const profesor_id = document.getElementById('profesor').value;

  const res = await fetch('/api/cursos?action=crear', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ nombre, descripcion, profesor_id, estudiantes: windowEstudiantes })
  });
  const data = await res.json();
  if (res.ok) {
    alert('Curso creado exitosamente');
    formCurso.reset();
    windowEstudiantes = [];
  } else {
    alert('Error al crear curso');
  }
});

async function cargarCursos() {
  const res = await fetch('/api/cursos?action=obtener');
  const cursos = await res.json();
  const contenedor = document.getElementById('lista-cursos');
  contenedor.innerHTML = '';

  for (const curso of cursos) {
    const div = document.createElement('div');
    div.className = 'border p-4 rounded';
    div.innerHTML = `
      <h3 class="font-bold">${curso.nombre}</h3>
      <p>${curso.descripcion}</p>
      <p class="text-sm">Profesor: ${curso.profesor}</p>
      <button class="mt-2 bg-indigo-600 text-white px-2 py-1 rounded" onclick="verEstudiantes(${curso.id})">Ver Estudiantes</button>
      <div id="estudiantes-${curso.id}" class="mt-2 hidden"></div>
    `;
    contenedor.appendChild(div);
  }
}

async function verEstudiantes(cursoId) {
  const div = document.getElementById(`estudiantes-${cursoId}`);
  if (!div.classList.contains('hidden')) {
    div.classList.add('hidden');
    return;
  }

  windowCursoActivo = cursoId;
  const res = await fetch(`/api/cursos?action=estudiantes&curso_id=${cursoId}`);
  const estudiantes = await res.json();
  div.classList.remove('hidden');
  div.innerHTML = estudiantes.map(e => `
    <div class="flex justify-between border-b py-1">
      <span>${e.nombre} (${e.email})</span>
      <button onclick="desmatricular(${cursoId}, ${e.id})" class="text-red-600">Desmatricular</button>
    </div>
  `).join('');
}

async function desmatricular(cursoId, estudianteId) {
  const res = await fetch(`/api/cursos?action=desmatricular&curso_id=${cursoId}&estudiante_id=${estudianteId}`, {
    method: 'DELETE'
  });
  if (res.ok) {
    alert('Estudiante desmatriculado');
    verEstudiantes(cursoId);
  } else {
    alert('Error al desmatricular');
  }
}

  </script>
</body>
</html>
