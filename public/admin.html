<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Administración</title>
    <link rel="stylesheet" href="/css/admin.css">
</head>
<body>
    <header>
        <nav>
            <ul>
                <li><a href="#usuarios" class="active" onclick="obtenerUsuarios('pendiente')">Usuarios</a></li>
            </ul>
        </nav>
    </header>
    
    <main>
        <section id="usuarios">
            <h2>Usuarios</h2>
            <div class="filtros">
                <button onclick="obtenerUsuarios('pendiente')">Pendientes</button>
                <button onclick="obtenerUsuarios('aprobado')">Aprobados</button>
                <button onclick="obtenerUsuarios('rechazado')">Rechazados</button>
            </div>
            <div id="contenedor-usuarios" class="usuarios-grid">
                <!-- Aquí se insertarán los usuarios dinámicamente -->
            </div>
        </section>
    </main>

    <!-- Modal para la descripción -->
    <div id="modalDescripcion" class="modal">
        <div class="modal-content">
            <span class="close" onclick="cerrarModal()">&times;</span>
            <h3>Descripción del Usuario</h3>
            <p id="descripcionUsuario"></p>
        </div>
    </div>

    <script>
        async function obtenerUsuarios(estado) {
            try {
                const response = await fetch(`/api/admin?estado=${estado}`);
                const data = await response.json();
                const contenedor = document.getElementById("contenedor-usuarios");
                if (!contenedor) return;
                contenedor.innerHTML = "";

                data.forEach(usuario => {
                    const div = document.createElement("div");
                    div.classList.add("usuario-card");
                    div.innerHTML = `
                        <h3>${usuario.nombre}</h3>
                        <p><strong>Email:</strong> ${usuario.email}</p>
                        <button onclick="verDescripcion(\`${usuario.descripcion ? usuario.descripcion.replace(/`/g, "\\`") : "Sin descripción"}\`)">Ver Descripción</button>
                        <div class="botones">
                            <button class="btn-aprobar" onclick="actualizarEstado(${usuario.id}, 'aprobar')">Aprobar</button>
                            <button class="btn-rechazar" onclick="rechazarUsuario(${usuario.id})">Rechazar</button>
                        </div>
                    `;
                    contenedor.appendChild(div);
                });
            } catch (error) {
                console.error("Error obteniendo usuarios:", error);
            }
        }

        function verDescripcion(descripcion) {
            document.getElementById("descripcionUsuario").textContent = descripcion;
            document.getElementById("modalDescripcion").style.display = "block";
        }

        function cerrarModal() {
            document.getElementById("modalDescripcion").style.display = "none";
        }

        async function actualizarEstado(id, accion) {
            try {
                await fetch(`/api/admin`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ id, accion })
                });
                obtenerUsuarios("pendiente");
            } catch (error) {
                console.error(`Error al ${accion} usuario:`, error);
            }
        }

        async function rechazarUsuario(id) {
            const motivo = prompt("Ingrese el motivo del rechazo:");
            if (!motivo) {
                alert("Debe ingresar un motivo para rechazar al usuario.");
                return;
            }

            try {
                await fetch(`/api/rechazar_usuario`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ user_id: id, rejection_reason: motivo })
                });
                alert("Usuario rechazado correctamente.");
                obtenerUsuarios("pendiente");
            } catch (error) {
                console.error("Error al rechazar usuario:", error);
            }
        }

        document.addEventListener("DOMContentLoaded", () => {
            obtenerUsuarios("pendiente");
        });
    </script>
</body>
</html>
