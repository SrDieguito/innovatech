<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Perfil</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root { --green: #00983d; }

    .btn {
      display: inline-flex; align-items: center; gap: 0.4rem;
      font-weight: 600; font-size: 0.875rem; border-radius: 0.5rem;
      padding: 0.5rem 1rem; transition: all 0.2s; cursor: pointer;
      border: none; outline: none;
    }
    .btn-primary { background: var(--green); color: #fff; }
    .btn-primary:hover { background: #007d32; box-shadow: 0 4px 12px rgba(0,152,61,.3); }
    .btn-primary:active { transform: scale(0.97); }
    .btn-outline { background: #fff; color: var(--green); border: 1.5px solid var(--green); }
    .btn-outline:hover { background: #f0fdf4; }
    .btn-outline:active { transform: scale(0.97); }
    .btn-danger { background: #dc2626; color: #fff; }
    .btn-danger:hover { background: #b91c1c; }

    .input-field {
      width: 100%; border: 1.5px solid #d1d5db; border-radius: 0.5rem;
      padding: 0.5rem 0.75rem; font-size: 0.875rem; transition: border-color 0.2s, box-shadow 0.2s;
    }
    .input-field:focus { outline: none; border-color: var(--green); box-shadow: 0 0 0 3px rgba(0,152,61,.12); }

    .card { background: #fff; border-radius: 0.875rem; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
    .avatar { background: linear-gradient(135deg,#bbf7d0,#86efac); color: #166534; }

    /* Modal */
    #modal-overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,.45);
      z-index: 100; align-items: center; justify-content: center; padding: 1rem;
    }
    #modal-overlay.open { display: flex; animation: fadeIn .15s ease; }
    @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
    #modal-box { animation: slideUp .2s ease; }
    @keyframes slideUp { from { opacity:0; transform: translateY(12px); } to { opacity:1; transform: translateY(0); } }

    .page-enter { animation: pageIn .4s ease; }
    @keyframes pageIn { from { opacity:0; transform: translateY(8px); } to { opacity:1; transform: translateY(0); } }
  </style>
</head>
<body class="min-h-screen bg-gray-50">

<div id="header-container"></div>

<main class="max-w-5xl mx-auto px-4 py-8 page-enter">

  <!-- Encabezado de perfil -->
  <div class="card p-6 mb-6 flex flex-col sm:flex-row items-center gap-5">
    <div class="avatar w-20 h-20 rounded-full flex items-center justify-center text-3xl font-extrabold shrink-0 shadow" id="iniciales-usuario">US</div>
    <div class="flex-1 text-center sm:text-left">
      <h1 class="text-2xl font-extrabold text-gray-900" id="nombre-completo">Cargando...</h1>
      <p class="text-sm text-gray-500 mt-0.5" id="email-usuario"></p>
      <p class="text-xs text-gray-400 mt-0.5 capitalize" id="rol-usuario"></p>
    </div>
    <div class="flex gap-2">
      <button class="btn btn-primary" onclick="abrirModal()">
        <i class="fas fa-edit"></i> Editar perfil
      </button>
    </div>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
    <!-- Columna izquierda: datos -->
    <div class="space-y-5">
      <!-- Información de contacto -->
      <div class="card p-5">
        <h3 class="font-semibold text-gray-800 mb-4 flex items-center gap-2">
          <i class="fas fa-address-card text-green-600"></i> Información
        </h3>
        <div class="space-y-3 text-sm">
          <div>
            <span class="text-gray-400 text-xs uppercase tracking-wide font-medium">Correo</span>
            <p class="text-gray-800 font-medium mt-0.5" id="info-email">—</p>
          </div>
          <div id="info-telefono-wrap">
            <span class="text-gray-400 text-xs uppercase tracking-wide font-medium">Teléfono</span>
            <p class="text-gray-800 font-medium mt-0.5" id="info-telefono">—</p>
          </div>
          <div id="info-descripcion-wrap" class="hidden">
            <span class="text-gray-400 text-xs uppercase tracking-wide font-medium">Descripción</span>
            <p class="text-gray-700 mt-0.5 leading-relaxed" id="info-descripcion"></p>
          </div>
        </div>
      </div>
    </div>

    <!-- Columna central: cursos -->
    <div class="md:col-span-2">
      <div class="card p-5">
        <h3 class="font-semibold text-gray-800 mb-4 flex items-center gap-2">
          <i class="fas fa-book-open text-green-600"></i> Mis cursos
        </h3>
        <div id="cursos-loading" class="py-6 text-center text-gray-400">
          <i class="fas fa-spinner fa-spin text-2xl mb-2"></i>
          <p class="text-sm">Cargando cursos...</p>
        </div>
        <div id="cursos-empty" class="hidden py-6 text-center text-gray-400">
          <i class="fas fa-inbox text-3xl mb-2"></i>
          <p class="text-sm">No estás inscrito en ningún curso.</p>
        </div>
        <div id="cursos-lista" class="hidden grid grid-cols-1 sm:grid-cols-2 gap-3"></div>
      </div>
    </div>
  </div>
</main>

<!-- Modal editar perfil -->
<div id="modal-overlay" role="dialog" aria-modal="true">
  <div id="modal-box" class="bg-white rounded-2xl shadow-2xl w-full max-w-md">
    <div class="flex items-center justify-between px-6 py-4 border-b">
      <h2 class="text-lg font-bold text-gray-900">Editar perfil</h2>
      <button onclick="cerrarModal()" class="text-gray-400 hover:text-gray-600 transition text-xl leading-none">&times;</button>
    </div>
    <form id="form-editar" class="px-6 py-5 space-y-4" onsubmit="guardarPerfil(event)">
      <div id="modal-error" class="hidden text-sm text-red-600 bg-red-50 border border-red-200 rounded-lg px-3 py-2"></div>
      <div id="modal-success" class="hidden text-sm text-green-700 bg-green-50 border border-green-200 rounded-lg px-3 py-2"></div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Nombre completo</label>
        <input type="text" id="edit-nombre" class="input-field" placeholder="Tu nombre" required>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Correo electrónico</label>
        <input type="email" id="edit-email" class="input-field" placeholder="tu@correo.com" required>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Teléfono <span class="text-gray-400 font-normal">(opcional)</span></label>
        <input type="tel" id="edit-telefono" class="input-field" placeholder="+593 99 000 0000">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Descripción <span class="text-gray-400 font-normal">(opcional)</span></label>
        <textarea id="edit-descripcion" class="input-field resize-none" rows="3" placeholder="Cuéntanos sobre ti..."></textarea>
      </div>
      <div class="flex gap-3 pt-2">
        <button type="submit" id="btn-guardar" class="btn btn-primary flex-1">
          <i class="fas fa-save"></i> Guardar cambios
        </button>
        <button type="button" onclick="cerrarModal()" class="btn btn-outline">
          Cancelar
        </button>
      </div>
    </form>
  </div>
</div>

<script>
let perfil = {};

async function cargarPerfil() {
  try {
    const res = await fetch('/api/perfil', { credentials: 'include' });
    if (!res.ok) { window.location.href = '/auth/login.html'; return; }
    perfil = await res.json();

    const iniciales = (perfil.nombre || 'US').split(' ').map(n => n[0]).join('').toUpperCase().slice(0,2);
    document.getElementById('iniciales-usuario').textContent = iniciales;
    document.getElementById('nombre-completo').textContent = perfil.nombre || '—';
    document.getElementById('email-usuario').textContent = perfil.email || '';
    document.getElementById('rol-usuario').textContent = rolLabel(perfil.rol);
    document.getElementById('info-email').textContent = perfil.email || '—';
    document.getElementById('info-telefono').textContent = perfil.telefono || '—';

    if (perfil.descripcion) {
      document.getElementById('info-descripcion').textContent = perfil.descripcion;
      document.getElementById('info-descripcion-wrap').classList.remove('hidden');
    }
  } catch(e) {
    console.error(e);
  }
}

function rolLabel(rol) {
  return { admin: 'Administrador', profesor: 'Profesor', usuario: 'Estudiante' }[rol] || rol || '';
}

async function cargarCursos() {
  try {
    const res = await fetch('/api/miscursos', { credentials: 'include' });
    const data = await res.json();
    const cursos = Array.isArray(data.data) ? data.data : [];

    document.getElementById('cursos-loading').classList.add('hidden');

    if (!cursos.length) {
      document.getElementById('cursos-empty').classList.remove('hidden');
      return;
    }

    const lista = document.getElementById('cursos-lista');
    lista.classList.remove('hidden');
    lista.innerHTML = cursos.map(c => `
      <a href="/views/curso.html?id=${c.id}"
         class="group block border border-gray-200 rounded-xl p-4 hover:border-green-400 hover:shadow-md transition-all duration-200">
        <div class="flex items-start gap-3">
          <div class="w-9 h-9 rounded-lg bg-green-100 text-green-700 flex items-center justify-center shrink-0 group-hover:bg-green-600 group-hover:text-white transition-colors duration-200">
            <i class="fas fa-book text-sm"></i>
          </div>
          <div class="min-w-0 flex-1">
            <p class="font-semibold text-gray-800 text-sm truncate group-hover:text-green-700 transition-colors">${esc(c.nombre)}</p>
            <p class="text-xs text-gray-400 mt-0.5 truncate">${esc(c.profesor || 'Sin profesor')}</p>
            <span class="inline-block mt-1.5 text-xs px-2 py-0.5 rounded-full font-medium ${c.rol === 'profesor' ? 'bg-blue-100 text-blue-700' : 'bg-green-100 text-green-700'}">
              ${c.rol === 'profesor' ? 'Profesor' : 'Estudiante'}
            </span>
          </div>
        </div>
      </a>
    `).join('');
  } catch(e) {
    document.getElementById('cursos-loading').classList.add('hidden');
    document.getElementById('cursos-empty').classList.remove('hidden');
  }
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function abrirModal() {
  document.getElementById('edit-nombre').value = perfil.nombre || '';
  document.getElementById('edit-email').value = perfil.email || '';
  document.getElementById('edit-telefono').value = perfil.telefono || '';
  document.getElementById('edit-descripcion').value = perfil.descripcion || '';
  document.getElementById('modal-error').classList.add('hidden');
  document.getElementById('modal-success').classList.add('hidden');
  document.getElementById('modal-overlay').classList.add('open');
}

function cerrarModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}

async function guardarPerfil(e) {
  e.preventDefault();
  const btn = document.getElementById('btn-guardar');
  const errEl = document.getElementById('modal-error');
  const okEl  = document.getElementById('modal-success');
  errEl.classList.add('hidden');
  okEl.classList.add('hidden');

  btn.disabled = true;
  btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Guardando...';

  const body = {
    nombre:      document.getElementById('edit-nombre').value.trim(),
    email:       document.getElementById('edit-email').value.trim(),
    telefono:    document.getElementById('edit-telefono').value.trim(),
    descripcion: document.getElementById('edit-descripcion').value.trim(),
  };

  try {
    const res = await fetch('/api/perfil', {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify(body),
    });
    const data = await res.json();
    if (res.ok) {
      perfil = { ...perfil, ...body };
      document.getElementById('nombre-completo').textContent = body.nombre;
      document.getElementById('email-usuario').textContent = body.email;
      document.getElementById('info-email').textContent = body.email || '—';
      document.getElementById('info-telefono').textContent = body.telefono || '—';
      const iniciales = body.nombre.split(' ').map(n => n[0]).join('').toUpperCase().slice(0,2);
      document.getElementById('iniciales-usuario').textContent = iniciales;
      if (body.descripcion) {
        document.getElementById('info-descripcion').textContent = body.descripcion;
        document.getElementById('info-descripcion-wrap').classList.remove('hidden');
      }
      okEl.textContent = '✓ Perfil actualizado correctamente';
      okEl.classList.remove('hidden');
      setTimeout(() => cerrarModal(), 1500);
    } else {
      errEl.textContent = data.message || 'Error al guardar cambios';
      errEl.classList.remove('hidden');
    }
  } catch {
    errEl.textContent = 'Error de conexión';
    errEl.classList.remove('hidden');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<i class="fas fa-save"></i> Guardar cambios';
  }
}

// Cerrar modal al hacer clic fuera
document.getElementById('modal-overlay').addEventListener('click', (e) => {
  if (e.target === document.getElementById('modal-overlay')) cerrarModal();
});

// Cargar header
fetch('/views/header.html').then(r => r.text()).then(html => {
  const c = document.getElementById('header-container');
  c.innerHTML = html;
  c.querySelectorAll('script').forEach(s => {
    const ns = document.createElement('script');
    if (s.src) ns.src = s.src; else ns.textContent = s.textContent;
    document.body.appendChild(ns);
    s.remove();
  });
});

cargarPerfil();
cargarCursos();
</script>
</body>
</html>
