<html lang="es">
 <head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1" name="viewport"/>
  <title>
   Mis cursos
  </title>
  <script src="https://cdn.tailwindcss.com">
  </script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet"/>
 </head>
 <body class="bg-white text-gray-900 font-sans">
  
  <div id="header-container"></div>

  <main class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 mt-8">
   <h1 class="text-2xl font-extrabold mb-2">
    Mis cursos
   </h1>
   <h2 class="font-semibold text-gray-900 mb-4">
    Vista general de curso
   </h2>
   <hr class="border-gray-300 mb-8"/>
   <section class="flex flex-col items-center text-center px-4 sm:px-0">
    <img alt="Icono gris de un documento con cuatro tarjetas, representando cursos vacíos" class="mb-4" height="64" src="https://storage.googleapis.com/a1aa/image/ede5611e-3825-4243-5061-17a8dea70976.jpg" width="64"/>
    <p class="font-semibold text-gray-900 mb-2">
     Usted no está matriculado en ningún curso
    </p>
    <p class="text-gray-700 max-w-md">
     Una vez que usted se inscriba en un curso, aparecerá aquí.
    </p>
   </section>
  </main>
  <button aria-label="Ayuda" class="fixed bottom-4 right-4 w-8 h-8 rounded-full bg-gray-300 text-gray-700 text-sm font-semibold flex items-center justify-center select-none">
   ?
  </button>

<script>
  fetch('/views/header.html')
    .then(res => res.text())
    .then(html => {
      const container = document.getElementById('header-container');
      container.innerHTML = html;

      // Ejecutar cualquier <script> incluido dentro de header.html
      const scripts = container.querySelectorAll('script');
      scripts.forEach(oldScript => {
        const newScript = document.createElement('script');
        if (oldScript.src) {
          newScript.src = oldScript.src;
        } else {
          newScript.textContent = oldScript.textContent;
        }
        document.body.appendChild(newScript);
        oldScript.remove();
      });
    });
  </script>

 </body>
 
</html>
