<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mis Calificaciones</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root { --green: #00983d; }
    .btn {
      display: inline-flex; align-items: center; gap: 0.4rem;
      font-weight: 600; font-size: 0.875rem; border-radius: 0.5rem;
      padding: 0.5rem 1rem; transition: all 0.2s; cursor: pointer; border: none;
    }
    .btn-primary { background: var(--green); color: #fff; }
    .btn-primary:hover { background: #007d32; box-shadow: 0 4px 12px rgba(0,152,61,.3); }
    .btn-primary:active { transform: scale(0.97); }
    .btn-outline { background: #fff; color: var(--green); border: 1.5px solid var(--green); }
    .btn-outline:hover { background: #f0fdf4; }

    .card { background: #fff; border-radius: 0.875rem; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
    .grade-pill {
      display: inline-block; padding: 0.2rem 0.6rem;
      border-radius: 9999px; font-size: 0.75rem; font-weight: 700;
    }
    .grade-high { background: #dcfce7; color: #166534; }
    .grade-mid  { background: #fef9c3; color: #854d0e; }
    .grade-low  { background: #fee2e2; color: #991b1b; }
    .grade-none { background: #f3f4f6; color: #6b7280; }

    .page-enter { animation: pageIn .35s ease; }
    @keyframes pageIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

    details summary { cursor: pointer; }
    details summary::-webkit-details-marker { display: none; }
    details[open] .chevron { transform: rotate(180deg); }
    .chevron { transition: transform 0.2s; }
  </style>
</head>
<body class="min-h-screen bg-gray-50">

<div id="header-container"></div>

<main class="max-w-4xl mx-auto px-4 py-8 page-enter">

  <!-- Encabezado -->
  <div class="mb-6">
    <h1 class="text-2xl font-extrabold text-gray-900">Mis Calificaciones</h1>
    <p class="text-sm text-gray-500 mt-1">Resumen de calificaciones por curso</p>
  </div>

  <!-- Estado general -->
  <div id="resumen-general" class="hidden grid grid-cols-3 gap-4 mb-6">
    <div class="card p-4 text-center">
      <p class="text-2xl font-extrabold text-green-700" id="stat-cursos">0</p>
      <p class="text-xs text-gray-500 mt-1">Cursos</p>
    </div>
    <div class="card p-4 text-center">
      <p class="text-2xl font-extrabold text-blue-600" id="stat-tareas">0</p>
      <p class="text-xs text-gray-500 mt-1">Tareas evaluadas</p>
    </div>
    <div class="card p-4 text-center">
      <p class="text-2xl font-extrabold text-yellow-600" id="stat-promedio">—</p>
      <p class="text-xs text-gray-500 mt-1">Promedio general</p>
    </div>
  </div>

  <!-- Loading -->
  <div id="loading" class="card p-12 text-center text-gray-400">
    <i class="fas fa-spinner fa-spin text-3xl mb-3"></i>
    <p>Cargando calificaciones...</p>
  </div>

  <!-- Sin cursos -->
  <div id="sin-cursos" class="hidden card p-12 text-center text-gray-400">
    <i class="fas fa-graduation-cap text-4xl mb-3"></i>
    <p class="font-medium">No estás inscrito en ningún curso todavía.</p>
    <a href="/views/miscursos.html" class="btn btn-primary mt-4">
      <i class="fas fa-search"></i> Ver cursos disponibles
    </a>
  </div>

  <!-- Lista de cursos con calificaciones -->
  <div id="lista-cursos" class="hidden space-y-4"></div>

</main>

<script>
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function formatFecha(s) {
  if (!s) return '—';
  return new Date(s).toLocaleDateString('es-EC', { day:'2-digit', month:'short', year:'numeric' });
}
function gradePillClass(cal) {
  if (cal === null || cal === undefined) return 'grade-none';
  const n = Number(cal);
  if (n >= 7) return 'grade-high';
  if (n >= 5) return 'grade-mid';
  return 'grade-low';
}

async function cargar() {
  try {
    const resC = await fetch('/api/miscursos', { credentials: 'include' });
    if (!resC.ok) { window.location.href = '/auth/login.html'; return; }
    const dataC = await resC.json();
    const cursos = Array.isArray(dataC.data) ? dataC.data : [];

    document.getElementById('loading').classList.add('hidden');

    if (!cursos.length) {
      document.getElementById('sin-cursos').classList.remove('hidden');
      return;
    }

    // Cargar calificaciones para cada curso en paralelo
    const resultados = await Promise.all(
      cursos.map(c =>
        fetch(`/api/calificaciones?action=listar_por_curso&curso_id=${c.id}`, { credentials: 'include' })
          .then(r => r.ok ? r.json() : { tareas: [] })
          .then(d => ({ curso: c, tareas: d.tareas || [] }))
          .catch(() => ({ curso: c, tareas: [] }))
      )
    );

    // Calcular estadísticas globales (solo cursos de estudiante)
    let totalTareasEvaluadas = 0;
    let todasLasNotas = [];
    resultados.forEach(({ curso, tareas }) => {
      if (curso.rol === 'profesor') return;
      tareas.forEach(t => {
        const est = (t.estudiantes || [])[0];
        if (est?.calificacion !== null && est?.calificacion !== undefined) {
          todasLasNotas.push(Number(est.calificacion));
          totalTareasEvaluadas++;
        }
      });
    });
    const promedioGeneral = todasLasNotas.length
      ? (todasLasNotas.reduce((a, b) => a + b, 0) / todasLasNotas.length).toFixed(1)
      : null;

    const estudianteCursos = cursos.filter(c => c.rol !== 'profesor').length;
    document.getElementById('stat-cursos').textContent = cursos.length;
    document.getElementById('stat-tareas').textContent = totalTareasEvaluadas;
    document.getElementById('stat-promedio').textContent = promedioGeneral ?? (estudianteCursos ? '—' : 'N/A');
    document.getElementById('resumen-general').classList.remove('hidden');

    // Renderizar cursos
    const lista = document.getElementById('lista-cursos');
    lista.classList.remove('hidden');

    lista.innerHTML = resultados.map(({ curso, tareas }) => {
      const esProfesor = curso.rol === 'profesor';

      // --- Estadísticas del curso ---
      let promedioCurso = null;
      if (esProfesor) {
        const todasNotas = tareas.flatMap(t => (t.estudiantes||[]).map(e => e.calificacion)).filter(n => n != null).map(Number);
        promedioCurso = todasNotas.length ? (todasNotas.reduce((a,b)=>a+b,0)/todasNotas.length).toFixed(1) : null;
      } else {
        const notasCurso = tareas.map(t => (t.estudiantes||[])[0]?.calificacion).filter(n => n != null).map(Number);
        promedioCurso = notasCurso.length ? (notasCurso.reduce((a,b)=>a+b,0)/notasCurso.length).toFixed(1) : null;
      }

      // --- Tabla para ESTUDIANTE ---
      const tareasStudentHTML = tareas.length === 0
        ? `<tr><td colspan="4" class="px-4 py-6 text-center text-gray-400 text-sm">Este curso no tiene tareas todavía.</td></tr>`
        : tareas.map(t => {
          const est = (t.estudiantes || [])[0];
          const cal = est?.calificacion ?? null;
          const entregada = est?.fecha_entrega != null;
          return `
            <tr class="hover:bg-gray-50 transition-colors">
              <td class="px-4 py-3">
                <p class="font-medium text-gray-800 text-sm">${esc(t.titulo)}</p>
                <p class="text-xs text-gray-400 mt-0.5"><i class="fas fa-calendar-alt mr-1"></i>Límite: ${formatFecha(t.fecha_limite)}</p>
              </td>
              <td class="px-4 py-3 text-center">
                ${entregada
                  ? `<span class="inline-flex items-center gap-1 text-xs text-green-700 bg-green-50 px-2 py-1 rounded-full font-medium"><i class="fas fa-check-circle"></i>Entregada</span>`
                  : `<span class="inline-flex items-center gap-1 text-xs text-gray-500 bg-gray-100 px-2 py-1 rounded-full font-medium"><i class="fas fa-clock"></i>Sin entregar</span>`}
              </td>
              <td class="px-4 py-3 text-center">
                <span class="grade-pill ${gradePillClass(cal)}">
                  ${cal !== null && cal !== undefined ? Number(cal).toFixed(1)+'/10' : 'Sin calificar'}
                </span>
              </td>
              <td class="px-4 py-3 text-sm text-gray-500 max-w-xs">${esc(est?.observaciones||'—')}</td>
            </tr>`;
        }).join('');

      // --- Tabla para PROFESOR ---
      const tareasProfesorHTML = tareas.length === 0
        ? `<tr><td colspan="4" class="px-4 py-6 text-center text-gray-400 text-sm">Este curso no tiene tareas todavía.</td></tr>`
        : tareas.map(t => {
          const notas = (t.estudiantes||[]).map(e=>e.calificacion).filter(n=>n!=null).map(Number);
          const prom = notas.length ? (notas.reduce((a,b)=>a+b,0)/notas.length).toFixed(1) : null;
          const entregadas = (t.estudiantes||[]).filter(e=>e.fecha_entrega!=null).length;
          const total = t.total || (t.estudiantes||[]).length;
          return `
            <tr class="hover:bg-gray-50 transition-colors">
              <td class="px-4 py-3">
                <p class="font-medium text-gray-800 text-sm">${esc(t.titulo)}</p>
                <p class="text-xs text-gray-400 mt-0.5"><i class="fas fa-calendar-alt mr-1"></i>Límite: ${formatFecha(t.fecha_limite)}</p>
              </td>
              <td class="px-4 py-3 text-center text-sm text-gray-700">
                ${entregadas}/${total} <span class="text-xs text-gray-400">entregas</span>
              </td>
              <td class="px-4 py-3 text-center">
                <span class="grade-pill ${gradePillClass(prom !== null ? Number(prom) : null)}">
                  ${prom !== null ? 'Prom: '+prom : 'Sin calificar'}
                </span>
              </td>
              <td class="px-4 py-3 text-center">
                <a href="/views/entregas.html?tarea_id=${t.id}&curso_id=${curso.id}"
                   class="text-xs text-green-700 hover:underline font-medium">
                  Ver entregas <i class="fas fa-external-link-alt"></i>
                </a>
              </td>
            </tr>`;
        }).join('');

      return `
        <details class="card overflow-hidden" open>
          <summary class="flex items-center justify-between px-5 py-4 hover:bg-gray-50 transition-colors select-none">
            <div class="flex items-center gap-3">
              <div class="w-9 h-9 rounded-lg bg-green-100 text-green-700 flex items-center justify-center shrink-0">
                <i class="fas fa-book text-sm"></i>
              </div>
              <div>
                <p class="font-bold text-gray-900">${esc(curso.nombre)}</p>
                <p class="text-xs text-gray-400">${esc(curso.profesor || 'Sin profesor')}</p>
              </div>
            </div>
            <div class="flex items-center gap-4">
              ${promedioCurso !== null
                ? `<span class="grade-pill ${gradePillClass(Number(promedioCurso))} text-sm">Promedio: ${promedioCurso}</span>`
                : `<span class="grade-pill grade-none text-sm">Sin calificar</span>`
              }
              <a href="/views/curso.html?id=${curso.id}" onclick="event.stopPropagation()"
                 class="text-xs text-green-700 hover:text-green-800 font-medium hover:underline">
                Ir al curso <i class="fas fa-external-link-alt text-xs"></i>
              </a>
              <i class="fas fa-chevron-down chevron text-gray-400 text-sm"></i>
            </div>
          </summary>
          <div class="border-t border-gray-100 overflow-x-auto">
            <table class="w-full text-sm">
              <thead class="bg-gray-50">
                <tr>
                  <th class="px-4 py-2.5 text-left text-xs font-semibold text-gray-500 uppercase tracking-wide">Tarea</th>
                  ${esProfesor
                    ? `<th class="px-4 py-2.5 text-center text-xs font-semibold text-gray-500 uppercase tracking-wide">Entregas</th>
                       <th class="px-4 py-2.5 text-center text-xs font-semibold text-gray-500 uppercase tracking-wide">Promedio</th>
                       <th class="px-4 py-2.5 text-center text-xs font-semibold text-gray-500 uppercase tracking-wide">Acciones</th>`
                    : `<th class="px-4 py-2.5 text-center text-xs font-semibold text-gray-500 uppercase tracking-wide">Estado</th>
                       <th class="px-4 py-2.5 text-center text-xs font-semibold text-gray-500 uppercase tracking-wide">Calificación</th>
                       <th class="px-4 py-2.5 text-left text-xs font-semibold text-gray-500 uppercase tracking-wide">Observaciones</th>`}
                </tr>
              </thead>
              <tbody class="divide-y divide-gray-100">${esProfesor ? tareasProfesorHTML : tareasStudentHTML}</tbody>
            </table>
          </div>
        </details>
      `;
    }).join('');

  } catch(e) {
    console.error(e);
    document.getElementById('loading').innerHTML = `
      <div class="text-red-500 py-8 text-center">
        <i class="fas fa-exclamation-circle text-3xl mb-2"></i>
        <p>Error al cargar calificaciones. Intenta recargar la página.</p>
      </div>
    `;
  }
}

fetch('/views/header.html').then(r => r.text()).then(html => {
  const c = document.getElementById('header-container');
  c.innerHTML = html;
  c.querySelectorAll('script').forEach(s => {
    const ns = document.createElement('script');
    if (s.src) ns.src = s.src; else ns.textContent = s.textContent;
    document.body.appendChild(ns);
    s.remove();
  });
});

cargar();
</script>
</body>
</html>
