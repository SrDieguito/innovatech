<script>
  // Usuario: nombre e iniciales
  fetch('/api/perfil')
    .then(res => res.json())
    .then(data => {
      const nameParts = data.nombre.trim().split(/\s+/);
      const firstName = nameParts[0] || '';
      const firstLastName = nameParts[1] || '';
      const initials = (firstName[0] || '') + (firstLastName[0] || '');

      document.getElementById('user-name').textContent = data.nombre.toUpperCase();
      document.getElementById('user-initials').textContent = initials.toUpperCase();
    })
    .catch(() => {
      document.getElementById('user-name').textContent = "USUARIO";
      document.getElementById('user-initials').textContent = "US";
    });

  // Calendario
  const calendarBody = document.getElementById('calendar-body');
  const monthYearLabel = document.getElementById('monthYear');
  const months = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio",
                  "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];
  let currentDate = new Date();

  function renderCalendar(date) {
    const year = date.getFullYear();
    const month = date.getMonth();
    const today = new Date();

    const firstDay = new Date(year, month, 1).getDay();
    const daysInMonth = new Date(year, month + 1, 0).getDate();

    // Limpiar tabla
    calendarBody.innerHTML = "";
    monthYearLabel.textContent = `${months[month]} ${year}`;

    let dayCount = 1;
    for (let week = 0; week < 6; week++) {
      const row = document.createElement('tr');
      for (let day = 0; day < 7; day++) {
        const cell = document.createElement('td');
        cell.className = "border border-gray-300 px-2 py-1 h-10 align-top";

        if (week === 0 && day < firstDay) {
          cell.textContent = "";
        } else if (dayCount > daysInMonth) {
          cell.textContent = "";
        } else {
          cell.textContent = dayCount;

          if (
            dayCount === today.getDate() &&
            month === today.getMonth() &&
            year === today.getFullYear()
          ) {
            cell.classList.add("bg-green-200", "font-bold");
          }

          // (Opcional) Agregar eventos o lógica al hacer clic
          cell.addEventListener("click", () => {
            alert(`Día seleccionado: ${dayCount}/${month + 1}/${year}`);
          });

          dayCount++;
        }
        row.appendChild(cell);
      }
      calendarBody.appendChild(row);
      if (dayCount > daysInMonth) break;
    }
  }

  // Navegación
  document.getElementById('prevMonth').addEventListener('click', () => {
    currentDate.setMonth(currentDate.getMonth() - 1);
    renderCalendar(currentDate);
  });

  document.getElementById('nextMonth').addEventListener('click', () => {
    currentDate.setMonth(currentDate.getMonth() + 1);
    renderCalendar(currentDate);
  });

  // Inicial
  renderCalendar(currentDate);
  const userMenuButton = document.getElementById('user-menu-button');
const userDropdown = document.getElementById('user-dropdown');

userMenuButton.addEventListener('click', (e) => {
  e.stopPropagation(); // evita que se cierre de inmediato
  userDropdown.classList.toggle('hidden');
});

window.addEventListener('click', (event) => {
  if (!userMenuButton.contains(event.target) && !userDropdown.contains(event.target)) {
    userDropdown.classList.add('hidden');
  }
});


userDropdown.addEventListener('click', (e) => {
  e.stopPropagation();
});

  const logoutLink = document.getElementById('logout-link');
  if (logoutLink) {
    logoutLink.addEventListener('click', async (e) => {
      e.preventDefault();

      const response = await fetch('/api/logout', { method: 'POST', credentials: 'include' });
      if (response.ok) {
        window.location.href = '/login'; // redirige al login
      } else {
        alert('Error al cerrar sesión');
      }
    });
  }
  
</script>
