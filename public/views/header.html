<style>
  :root { --green: #00983d; }

  header { background-color: var(--green); }

  /* Nav underline hover */
  header nav a {
    position: relative; color: rgba(255,255,255,.85); text-decoration: none;
    font-size: 0.875rem; font-weight: 600; transition: color .2s;
    padding-bottom: 2px;
  }
  header nav a::after {
    content: ''; position: absolute; bottom: -2px; left: 0;
    width: 0; height: 2px; background: #fff;
    transition: width .25s ease;
  }
  header nav a:hover { color: #fff; }
  header nav a:hover::after { width: 100%; }
  header nav a.active-nav { color: #fff; font-weight: 700; }
  header nav a.active-nav::after { width: 100%; }

  /* User dropdown */
  #user-dropdown {
    opacity: 0; transform: translateY(-6px); pointer-events: none;
    transition: opacity .15s ease, transform .15s ease;
  }
  #user-dropdown.show {
    opacity: 1; transform: translateY(0); pointer-events: auto;
  }
</style>

<header class="h-14 flex items-center justify-between px-4 sm:px-6 shadow-md">
  <!-- Brand -->
  <a href="/views/homeuser.html" class="flex items-center gap-2 text-white no-underline">
    <div class="w-7 h-7 rounded-lg bg-white/20 flex items-center justify-center shrink-0">
      <i class="fas fa-graduation-cap text-white text-xs"></i>
    </div>
    <span class="font-extrabold text-base hidden sm:inline">EduTech</span>
  </a>

  <!-- Nav links (center) -->
  <nav class="hidden md:flex items-center gap-6">
    <a href="/views/homeuser.html">Área personal</a>
    <a href="/views/miscursos.html">Mis cursos</a>
    <a href="/views/calificaciones.html">Calificaciones</a>
  </nav>

  <!-- Right side -->
  <div class="flex items-center gap-3 text-white text-sm">

    <!-- User menu -->
    <div class="relative flex items-center gap-2">
      <!-- Avatar + name -->
      <button id="user-menu-button" class="flex items-center gap-2 focus:outline-none group">
        <div id="user-initials"
             class="w-8 h-8 rounded-full bg-white/20 border border-white/30 flex items-center justify-center text-white font-bold text-sm group-hover:bg-white/30 transition-colors">
          US
        </div>
        <span id="user-name-header" class="hidden lg:block text-sm font-medium text-white/90 group-hover:text-white transition-colors max-w-[120px] truncate"></span>
        <i class="fas fa-chevron-down text-xs text-white/70 transition-transform" id="chevron-icon"></i>
      </button>

      <!-- Dropdown menu -->
      <div id="user-dropdown"
           class="absolute right-0 top-full mt-2 w-52 bg-white rounded-xl shadow-2xl border border-gray-100 z-50 overflow-hidden">
        <!-- User info header -->
        <div class="px-4 py-3 border-b border-gray-100 bg-gray-50">
          <p class="text-sm font-bold text-gray-900 truncate" id="dropdown-nombre">Usuario</p>
          <p class="text-xs text-gray-400 truncate" id="dropdown-email"></p>
        </div>

        <!-- Menu items -->
        <div class="py-1">
          <a href="/views/perfil.html"
             class="flex items-center gap-3 px-4 py-2.5 text-sm text-gray-700 hover:bg-gray-50 hover:text-green-700 transition-colors">
            <i class="fas fa-user-circle w-4 text-gray-400"></i>
            Mi perfil
          </a>
          <a href="/views/calificaciones.html"
             class="flex items-center gap-3 px-4 py-2.5 text-sm text-gray-700 hover:bg-gray-50 hover:text-green-700 transition-colors">
            <i class="fas fa-chart-bar w-4 text-gray-400"></i>
            Calificaciones
          </a>
          <a href="/views/preferencias.html"
             class="flex items-center gap-3 px-4 py-2.5 text-sm text-gray-700 hover:bg-gray-50 hover:text-green-700 transition-colors">
            <i class="fas fa-cog w-4 text-gray-400"></i>
            Preferencias
          </a>
        </div>

        <!-- Logout -->
        <div class="border-t border-gray-100 py-1">
          <a id="logout-link" href="#"
             class="flex items-center gap-3 px-4 py-2.5 text-sm text-red-600 hover:bg-red-50 transition-colors cursor-pointer">
            <i class="fas fa-sign-out-alt w-4"></i>
            Cerrar sesión
          </a>
        </div>
      </div>
    </div>

    <!-- Mobile hamburger -->
    <button id="header-mobile-btn" class="md:hidden text-white/80 hover:text-white transition-colors p-1">
      <i class="fas fa-bars text-base"></i>
    </button>
  </div>
</header>

<!-- Mobile nav -->
<div id="header-mobile-menu" class="md:hidden hidden" style="background:#007d32;">
  <div class="px-4 py-3 space-y-1 border-t border-white/20">
    <a href="/views/homeuser.html" class="block text-white/85 hover:text-white text-sm font-medium py-2 transition-colors">
      <i class="fas fa-home mr-2 w-4"></i>Área personal
    </a>
    <a href="/views/miscursos.html" class="block text-white/85 hover:text-white text-sm font-medium py-2 transition-colors">
      <i class="fas fa-book mr-2 w-4"></i>Mis cursos
    </a>
    <a href="/views/calificaciones.html" class="block text-white/85 hover:text-white text-sm font-medium py-2 transition-colors">
      <i class="fas fa-chart-bar mr-2 w-4"></i>Calificaciones
    </a>
    <a href="/views/perfil.html" class="block text-white/85 hover:text-white text-sm font-medium py-2 transition-colors">
      <i class="fas fa-user-circle mr-2 w-4"></i>Perfil
    </a>
    <a href="/views/preferencias.html" class="block text-white/85 hover:text-white text-sm font-medium py-2 transition-colors">
      <i class="fas fa-cog mr-2 w-4"></i>Preferencias
    </a>
    <a id="logout-mobile" href="#" class="block text-red-300 hover:text-red-200 text-sm font-medium py-2 transition-colors">
      <i class="fas fa-sign-out-alt mr-2 w-4"></i>Cerrar sesión
    </a>
  </div>
</div>

<script>
(function () {
  function getInitials(n) {
    if (!n) return 'US';
    const stop = new Set(['de','del','la','las','los','y','da','do']);
    const words = n.normalize('NFD').replace(/\p{Diacritic}/gu,'').trim().split(/\s+/).filter(w => !stop.has(w.toLowerCase()));
    if (!words.length) return 'US';
    const a = words[0][0], b = words.length > 1 ? words[words.length-1][0] : words[0][1] || words[0][0];
    return (a + b).toUpperCase();
  }

  // Load user profile
  fetch('/api/perfil', { credentials: 'include' })
    .then(r => { if (!r.ok) throw new Error(); return r.json(); })
    .then(p => {
      const nombre = (p?.nombre || '').trim();
      const el = document.getElementById('user-initials');
      const nameEl = document.getElementById('user-name-header');
      const dnEl = document.getElementById('dropdown-nombre');
      const deEl = document.getElementById('dropdown-email');
      if (el) el.textContent = getInitials(nombre) || 'US';
      if (nameEl) nameEl.textContent = nombre.split(' ')[0] || 'Usuario';
      if (dnEl) dnEl.textContent = nombre || 'Usuario';
      if (deEl) deEl.textContent = p?.email || '';
    })
    .catch(() => {});

  // Dropdown toggle
  const btn = document.getElementById('user-menu-button');
  const drop = document.getElementById('user-dropdown');
  const chevron = document.getElementById('chevron-icon');

  btn.addEventListener('click', (e) => {
    e.stopPropagation();
    const isOpen = drop.classList.contains('show');
    drop.classList.toggle('show');
    if (chevron) chevron.style.transform = isOpen ? '' : 'rotate(180deg)';
  });
  window.addEventListener('click', () => {
    drop.classList.remove('show');
    if (chevron) chevron.style.transform = '';
  });
  drop.addEventListener('click', e => e.stopPropagation());

  // Mobile menu toggle
  const mobileBtn = document.getElementById('header-mobile-btn');
  const mobileMenu = document.getElementById('header-mobile-menu');
  if (mobileBtn) {
    mobileBtn.addEventListener('click', e => {
      e.stopPropagation();
      mobileMenu.classList.toggle('hidden');
    });
    window.addEventListener('click', () => mobileMenu.classList.add('hidden'));
    mobileMenu.addEventListener('click', e => e.stopPropagation());
  }

  // Logout handler
  async function logout() {
    const r = await fetch('/api/logout', { method: 'POST', credentials: 'include' });
    if (r.ok) location.href = '/auth/login.html';
    else alert('Error al cerrar sesión');
  }
  document.getElementById('logout-link')?.addEventListener('click', e => { e.preventDefault(); logout(); });
  document.getElementById('logout-mobile')?.addEventListener('click', e => { e.preventDefault(); logout(); });

  // Active nav highlight
  const curPath = window.location.pathname;
  document.querySelectorAll('header nav a').forEach(a => {
    if (new URL(a.href, location.origin).pathname === curPath) {
      a.classList.add('active-nav');
    }
  });
})();
</script>
