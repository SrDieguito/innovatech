<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil de Usuario</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
        }
        .container {
            width: 80%;
            max-width: 900px;
            margin: 50px auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .settings {
            cursor: pointer;
            background: #00983d;
            color: white;
            padding: 10px 15px;
            border-radius: 5px;
            text-decoration: none;
        }
        .profile {
            text-align: center;
            padding: 20px;
        }
        .profile img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #00983d;
        }
        .profile h2 {
            margin-top: 10px;
            color: #00983d;
        }
        .description {
            margin-top: 20px;
            padding: 15px;
            background: #f9f9f9;
            border-radius: 5px;
        }
        .info {
            margin-top: 20px;
        }
        .info p {
            margin: 5px 0;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Perfil de Usuario</h1>
            <a href="#" class="settings">⚙ Configuración</a>
        </div>
        <div class="profile">
            <img src="profile.jpg" alt="Foto de perfil">
            <h2>Nombre del Usuario</h2>
            <p>Cargo o profesión</p>
        </div>
        <div class="description">
            <h3>Descripción</h3>
            <p>Aquí va la descripción del usuario...</p>
        </div>
        <div class="info">
            <h3>Información Adicional</h3>
            <p><strong>Correo:</strong> usuario@email.com</p>
            <p><strong>Teléfono:</strong> +123456789</p>
            <p><strong>Empresa:</strong> Nombre de la empresa</p>
        </div>
    </div>
</body>
</html>
