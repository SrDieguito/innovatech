<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Entregas</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet"/>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">

<div id="header-container" class="shadow bg-white"></div>

<main class="flex-grow max-w-5xl mx-auto w-full px-4 py-8">

  <!-- Volver -->
  <a id="btn-volver" href="#" class="inline-flex items-center gap-2 text-green-700 hover:underline text-sm mb-6">
    <i class="fas fa-arrow-left"></i> Volver al curso
  </a>

  <!-- Encabezado -->
  <div class="bg-white rounded-2xl shadow-md p-6 mb-6">
    <p class="text-xs text-gray-400 uppercase font-semibold mb-1" id="curso-nombre">Cargando...</p>
    <h1 class="text-2xl font-extrabold text-green-700" id="tarea-titulo">—</h1>
    <div class="flex flex-wrap gap-4 mt-3 text-sm text-gray-500" id="tarea-meta"></div>
  </div>

  <!-- Resumen -->
  <div class="grid grid-cols-3 gap-4 mb-6" id="resumen">
    <div class="bg-white rounded-xl shadow-sm p-4 text-center">
      <p class="text-2xl font-bold text-green-700" id="total-est">—</p>
      <p class="text-xs text-gray-500 mt-1">Estudiantes</p>
    </div>
    <div class="bg-white rounded-xl shadow-sm p-4 text-center">
      <p class="text-2xl font-bold text-blue-600" id="total-entregadas">—</p>
      <p class="text-xs text-gray-500 mt-1">Entregadas</p>
    </div>
    <div class="bg-white rounded-xl shadow-sm p-4 text-center">
      <p class="text-2xl font-bold text-yellow-600" id="total-calificadas">—</p>
      <p class="text-xs text-gray-500 mt-1">Calificadas</p>
    </div>
  </div>

  <!-- Lista de entregas -->
  <div class="bg-white rounded-2xl shadow-md p-6">
    <div class="flex justify-between items-center mb-4">
      <h2 class="text-lg font-bold text-gray-800">Entregas de estudiantes</h2>
      <a id="btn-exportar" href="#"
        class="text-sm bg-green-600 text-white px-4 py-2 rounded-lg hover:bg-green-700 transition">
        <i class="fas fa-file-excel mr-1"></i>Exportar Excel
      </a>
    </div>

    <div id="loading" class="text-center py-12 text-gray-400">
      <i class="fas fa-spinner fa-spin text-3xl mb-3"></i>
      <p>Cargando entregas...</p>
    </div>

    <div id="sin-entregas" class="hidden text-center py-12 text-gray-400">
      <i class="fas fa-inbox text-4xl mb-3"></i>
      <p class="font-medium">Ningún estudiante ha entregado aún.</p>
    </div>

    <div id="lista-entregas" class="hidden space-y-4"></div>
  </div>

</main>

<script>
const params   = new URLSearchParams(location.search);
const tareaId  = params.get('tarea_id');
const cursoId  = params.get('curso_id');

if (!tareaId) { alert('Falta tarea_id'); history.back(); }

document.getElementById('btn-volver').href  = `/views/curso.html?id=${cursoId}`;
document.getElementById('btn-exportar').href = `/api/entregas?action=exportar_calificaciones&tarea_id=${tareaId}`;

function escH(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function formatFecha(s) {
  if (!s) return '—';
  return new Date(s).toLocaleString('es-EC', { dateStyle: 'medium', timeStyle: 'short' });
}
function formatBytes(b) {
  if (!b) return '';
  if (b < 1024) return b + ' B';
  if (b < 1048576) return (b/1024).toFixed(1) + ' KB';
  return (b/1048576).toFixed(1) + ' MB';
}

async function cargar() {
  // Info de la tarea
  try {
    const r = await fetch(`/api/tareas?action=detalle&id=${tareaId}`, { credentials: 'include' });
    if (r.ok) {
      const t = await r.json();
      document.getElementById('tarea-titulo').textContent  = t.title || t.titulo || '—';
      document.getElementById('curso-nombre').textContent  = t.curso_nombre || '';
      document.getElementById('tarea-meta').innerHTML = `
        ${t.due_at ? `<span><i class="fas fa-calendar-alt mr-1"></i>Fecha límite: ${formatFecha(t.due_at)}</span>` : ''}
        ${t.points > 0 ? `<span><i class="fas fa-star mr-1 text-yellow-500"></i>${t.points} puntos</span>` : ''}
      `;
    }
  } catch {}

  // Entregas
  const r = await fetch(`/api/entregas?action=listar_por_tarea_profesor&tarea_id=${tareaId}`, { credentials: 'include' });
  const data = await r.json();
  const entregas = data.entregas || [];

  document.getElementById('loading').classList.add('hidden');

  // Resumen
  const calificadas = entregas.filter(e => e.calificacion != null).length;
  document.getElementById('total-entregadas').textContent = entregas.length;
  document.getElementById('total-calificadas').textContent = calificadas;

  // Total estudiantes del curso
  try {
    const re = await fetch(`/api/participantes?id=${cursoId}`, { credentials: 'include' });
    if (re.ok) { const p = await re.json(); document.getElementById('total-est').textContent = p.length; }
  } catch {}

  if (!entregas.length) {
    document.getElementById('sin-entregas').classList.remove('hidden');
    return;
  }

  const lista = document.getElementById('lista-entregas');
  lista.classList.remove('hidden');
  lista.innerHTML = entregas.map(e => `
    <div class="border rounded-xl p-4 space-y-3" id="entrega-${e.id}">
      <!-- Cabecera -->
      <div class="flex items-center justify-between">
        <div class="flex items-center gap-3">
          <div class="w-9 h-9 rounded-full bg-green-100 flex items-center justify-center text-green-700 font-bold shrink-0">
            ${(e.estudiante_nombre || 'E')[0].toUpperCase()}
          </div>
          <div>
            <p class="font-semibold text-gray-800">${escH(e.estudiante_nombre)}</p>
            <p class="text-xs text-gray-400">${escH(e.estudiante_email)}</p>
          </div>
        </div>
        <span class="text-xs px-2 py-1 rounded-full font-medium ${
          e.estado === 'revisado' ? 'bg-green-100 text-green-700' : 'bg-yellow-100 text-yellow-700'
        }">${e.estado === 'revisado' ? 'Calificado' : 'Pendiente'}</span>
      </div>

      <!-- Archivo -->
      <div class="flex items-center gap-3 bg-gray-50 rounded-lg px-4 py-3">
        <i class="fas fa-file text-gray-400 text-xl"></i>
        <div class="flex-1 min-w-0">
          <p class="text-sm font-medium text-gray-700 truncate">${escH(e.archivo_nombre || 'Sin archivo')}</p>
          <p class="text-xs text-gray-400">${formatBytes(e.tamano_bytes)} · ${formatFecha(e.fecha_entrega)}</p>
        </div>
        <a href="/api/entregas?action=descargar&tarea_id=${tareaId}&estudiante_id=${e.estudiante_id}"
           class="bg-green-600 text-white text-xs px-3 py-1.5 rounded-lg hover:bg-green-700 transition shrink-0">
          <i class="fas fa-download mr-1"></i>Descargar
        </a>
      </div>

      <!-- Calificación -->
      <div class="grid grid-cols-1 sm:grid-cols-3 gap-3 items-end">
        <div>
          <label class="text-xs text-gray-500 font-medium block mb-1">Calificación (0–10)</label>
          <input type="number" min="0" max="10" step="0.1"
            id="cal-${e.id}" value="${e.calificacion ?? ''}"
            placeholder="Ej: 8.5"
            class="w-full border rounded-lg px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-green-300">
        </div>
        <div class="sm:col-span-1">
          <label class="text-xs text-gray-500 font-medium block mb-1">Observaciones</label>
          <input type="text"
            id="obs-${e.id}" value="${escH(e.observacion || '')}"
            placeholder="Retroalimentación para el estudiante..."
            class="w-full border rounded-lg px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-green-300">
        </div>
        <div>
          <button onclick="calificar(${e.id})"
            class="w-full bg-green-600 text-white py-2 px-4 rounded-lg hover:bg-green-700 transition text-sm font-medium">
            <i class="fas fa-check mr-1"></i>Guardar calificación
          </button>
        </div>
      </div>
      <div id="msg-${e.id}" class="hidden text-xs font-medium"></div>
    </div>
  `).join('');
}

async function calificar(entregaId) {
  const calificacion = document.getElementById(`cal-${entregaId}`).value;
  const observacion  = document.getElementById(`obs-${entregaId}`).value;
  const msg          = document.getElementById(`msg-${entregaId}`);

  if (calificacion === '' || isNaN(Number(calificacion))) {
    msg.textContent = 'Ingresa una calificación válida (0–10).';
    msg.className = 'text-xs font-medium text-red-600';
    msg.classList.remove('hidden');
    return;
  }

  const r = await fetch('/api/entregas?action=calificar', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ entrega_id: entregaId, calificacion: Number(calificacion), observacion }),
    credentials: 'include'
  });

  if (r.ok) {
    msg.textContent = '✓ Calificación guardada';
    msg.className = 'text-xs font-medium text-green-600';
    msg.classList.remove('hidden');
    // Actualizar badge de estado
    const badge = document.querySelector(`#entrega-${entregaId} span.rounded-full`);
    if (badge) { badge.textContent = 'Calificado'; badge.className = 'text-xs px-2 py-1 rounded-full font-medium bg-green-100 text-green-700'; }
    setTimeout(() => msg.classList.add('hidden'), 3000);
  } else {
    const d = await r.json();
    msg.textContent = d.error || 'Error al guardar';
    msg.className = 'text-xs font-medium text-red-600';
    msg.classList.remove('hidden');
  }
}

cargar();
</script>

<script>
fetch('/views/header.html').then(r => r.text()).then(html => {
  const c = document.getElementById('header-container');
  c.innerHTML = html;
  c.querySelectorAll('script').forEach(s => {
    const ns = document.createElement('script');
    ns.src ? (ns.src = s.src) : (ns.textContent = s.textContent);
    document.body.appendChild(ns);
    s.remove();
  });
});
</script>

</body>
</html>
