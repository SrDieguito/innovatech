<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Área Personal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/alpinejs/3.13.0/cdn.min.js" defer></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <style>
    :root { --green: #00983d; }
    .btn {
      display: inline-flex; align-items: center; gap: 0.4rem;
      font-weight: 600; font-size: 0.875rem; border-radius: 0.5rem;
      padding: 0.5rem 1rem; transition: all 0.2s; cursor: pointer; border: none;
    }
    .btn-primary { background: var(--green); color: #fff; }
    .btn-primary:hover { background: #007d32; box-shadow: 0 4px 12px rgba(0,152,61,.3); }
    .btn-primary:active { transform: scale(0.97); }
    .btn-ghost { background: transparent; color: var(--green); padding: 0.4rem 0.7rem; }
    .btn-ghost:hover { background: rgba(0,152,61,.08); }

    .card { background: #fff; border-radius: 0.875rem; box-shadow: 0 1px 4px rgba(0,0,0,.08); }

    .stat-card {
      background: #fff; border-radius: 0.875rem;
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
      transition: transform .2s, box-shadow .2s;
    }
    .stat-card:hover { transform: translateY(-3px); box-shadow: 0 6px 20px rgba(0,0,0,.1); }

    .fade-in { animation: fadeIn .5s ease; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

    .calendar-day { transition: background-color .15s; }
    .calendar-day:hover { background-color: #f0fdf4; cursor: pointer; }
    .today-cell { background-color: rgba(0,152,61,.15) !important; font-weight: 700; }
    .has-event::after {
      content: ''; display: block; width: 4px; height: 4px;
      border-radius: 50%; background: var(--green);
      margin: 1px auto 0;
    }
  </style>
</head>
<body class="min-h-screen bg-gray-50">

<div id="header-container"></div>

<main class="max-w-5xl mx-auto px-4 py-8 space-y-6" x-data="dashboard()">

  <!-- Bienvenida -->
  <div class="card p-6 fade-in flex flex-col sm:flex-row items-start sm:items-center gap-4">
    <div>
      <h1 class="text-2xl font-extrabold text-gray-900">
        Bienvenido/a, <span class="text-green-700" x-text="userName">...</span>
      </h1>
      <p class="text-sm text-gray-500 mt-1" x-text="fechaHoy"></p>
    </div>
  </div>

  <!-- Alertas académicas -->
  <div x-show="alertas.length > 0" class="fade-in">
    <div class="flex items-center gap-2 mb-2">
      <i class="fas fa-exclamation-triangle text-orange-500 text-sm"></i>
      <h2 class="font-bold text-gray-900 text-sm">Alertas académicas</h2>
    </div>
    <div class="space-y-2">
      <template x-for="a in alertas" :key="a.curso_id">
        <a :href="`/views/curso.html?id=${a.curso_id}`"
           class="flex items-center gap-3 p-3 rounded-xl border transition-all"
           :class="a.nivel === 'peligro' ? 'bg-red-50 border-red-200 hover:border-red-400' : 'bg-yellow-50 border-yellow-200 hover:border-yellow-400'">
          <i class="text-lg shrink-0"
             :class="a.nivel === 'peligro' ? 'fas fa-exclamation-circle text-red-500' : 'fas fa-exclamation-triangle text-yellow-500'"></i>
          <div class="flex-1 min-w-0">
            <p class="font-semibold text-sm truncate"
               :class="a.nivel === 'peligro' ? 'text-red-800' : 'text-yellow-900'"
               x-text="a.curso_nombre"></p>
            <p class="text-xs"
               :class="a.nivel === 'peligro' ? 'text-red-600' : 'text-yellow-700'">
              Promedio: <span class="font-medium" x-text="a.promedio + '/10'"></span>
              <span x-show="a.nivel === 'peligro'"> · En riesgo de perder el curso</span>
              <span x-show="a.nivel === 'alerta'"> · Necesitas mejorar</span>
            </p>
          </div>
          <i class="fas fa-chevron-right text-xs shrink-0"
             :class="a.nivel === 'peligro' ? 'text-red-400' : 'text-yellow-500'"></i>
        </a>
      </template>
    </div>
  </div>

  <!-- Tarjetas resumen -->
  <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 fade-in">
    <div class="stat-card p-5 flex items-center gap-4">
      <div class="w-12 h-12 rounded-xl bg-green-100 text-green-700 flex items-center justify-center shrink-0">
        <i class="fas fa-book text-xl"></i>
      </div>
      <div>
        <p class="text-2xl font-extrabold text-gray-900" x-text="cursosActivos">—</p>
        <p class="text-sm text-gray-500">Cursos activos</p>
      </div>
    </div>
    <div class="stat-card p-5 flex items-center gap-4">
      <div class="w-12 h-12 rounded-xl bg-orange-100 text-orange-600 flex items-center justify-center shrink-0">
        <i class="fas fa-tasks text-xl"></i>
      </div>
      <div>
        <p class="text-2xl font-extrabold text-gray-900" x-text="actividadesPendientes">—</p>
        <p class="text-sm text-gray-500">Tareas pendientes</p>
      </div>
    </div>
    <div class="stat-card p-5 flex items-center gap-4">
      <div class="w-12 h-12 rounded-xl bg-blue-100 text-blue-600 flex items-center justify-center shrink-0">
        <i class="fas fa-calendar-check text-xl"></i>
      </div>
      <div>
        <p class="text-2xl font-extrabold text-gray-900" x-text="proximasEntregar">—</p>
        <p class="text-sm text-gray-500">Entregas próximas</p>
      </div>
    </div>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
    <!-- Cursos recientes -->
    <div class="card p-5 fade-in">
      <div class="flex items-center justify-between mb-4">
        <h2 class="font-bold text-gray-900">Mis cursos</h2>
        <a href="/views/miscursos.html" class="text-xs text-green-700 hover:underline font-medium">Ver todos</a>
      </div>
      <template x-if="cargando">
        <div class="py-6 text-center text-gray-400 text-sm">
          <i class="fas fa-spinner fa-spin mr-1"></i> Cargando...
        </div>
      </template>
      <template x-if="!cargando && cursos.length === 0">
        <div class="py-6 text-center text-gray-400 text-sm">
          <i class="fas fa-inbox text-2xl mb-2 block"></i>
          No estás inscrito en ningún curso.
        </div>
      </template>
      <div class="space-y-2" x-show="!cargando && cursos.length > 0">
        <template x-for="c in cursos.slice(0,4)" :key="c.id">
          <a :href="`/views/curso.html?id=${c.id}`"
             class="flex items-center gap-3 p-3 rounded-xl border border-gray-100 hover:border-green-300 hover:bg-green-50 transition-all group">
            <div class="w-9 h-9 rounded-lg bg-green-100 text-green-700 flex items-center justify-center shrink-0 group-hover:bg-green-600 group-hover:text-white transition-colors">
              <i class="fas fa-book text-sm"></i>
            </div>
            <div class="min-w-0 flex-1">
              <p class="font-semibold text-sm text-gray-800 truncate" x-text="c.nombre"></p>
              <p class="text-xs text-gray-400 truncate" x-text="c.profesor || 'Sin profesor'"></p>
            </div>
            <i class="fas fa-chevron-right text-gray-300 group-hover:text-green-600 transition-colors text-xs"></i>
          </a>
        </template>
      </div>
    </div>

    <!-- Tareas próximas -->
    <div class="card p-5 fade-in">
      <div class="flex items-center justify-between mb-4">
        <h2 class="font-bold text-gray-900">Próximas entregas</h2>
      </div>
      <template x-if="cargando">
        <div class="py-6 text-center text-gray-400 text-sm">
          <i class="fas fa-spinner fa-spin mr-1"></i> Cargando...
        </div>
      </template>
      <template x-if="!cargando && tareasProximas.length === 0">
        <div class="py-6 text-center text-gray-400 text-sm">
          <i class="fas fa-check-circle text-2xl text-green-500 mb-2 block"></i>
          No tienes entregas próximas.
        </div>
      </template>
      <div class="space-y-2" x-show="!cargando && tareasProximas.length > 0">
        <template x-for="t in tareasProximas.slice(0,5)" :key="t.id">
          <div class="flex items-start gap-3 p-3 rounded-xl border border-gray-100">
            <div class="w-8 h-8 rounded-lg flex items-center justify-center shrink-0 mt-0.5"
                 :class="t.urgente ? 'bg-red-100 text-red-600' : 'bg-orange-100 text-orange-500'">
              <i class="fas fa-file-alt text-sm"></i>
            </div>
            <div class="flex-1 min-w-0">
              <p class="font-semibold text-sm text-gray-800 truncate" x-text="t.title"></p>
              <p class="text-xs text-gray-400 truncate" x-text="t.cursoNombre"></p>
              <p class="text-xs mt-0.5" :class="t.urgente ? 'text-red-600 font-medium' : 'text-gray-500'" x-text="t.fechaStr"></p>
            </div>
          </div>
        </template>
      </div>
    </div>
  </div>

  <!-- Calendario -->
  <div class="card p-5 fade-in">
    <div class="flex items-center justify-between mb-4">
      <button @click="prevMonth" class="btn btn-ghost">
        <i class="fas fa-chevron-left"></i>
      </button>
      <h2 class="font-bold text-gray-900" x-text="monthYear"></h2>
      <button @click="nextMonth" class="btn btn-ghost">
        <i class="fas fa-chevron-right"></i>
      </button>
    </div>
    <table class="w-full text-sm">
      <thead>
        <tr>
          <template x-for="d in ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb']">
            <th class="py-2 text-center text-xs font-semibold text-gray-400 uppercase" x-text="d"></th>
          </template>
        </tr>
      </thead>
      <tbody>
        <template x-for="week in calendar" :key="week[0]?.date || Math.random()">
          <tr>
            <template x-for="day in week" :key="day.date + '-' + day.month">
              <td class="text-center py-1.5 px-1">
                <div class="calendar-day rounded-lg py-1 text-sm mx-auto w-8 relative"
                     :class="{
                       'today-cell rounded-lg text-green-800': day.isToday,
                       'text-gray-300': !day.number,
                       'has-event': day.hasEvent && day.number,
                     }"
                     :title="day.eventTitle || ''"
                     x-text="day.number || ''">
                </div>
              </td>
            </template>
          </tr>
        </template>
      </tbody>
    </table>
    <p class="text-xs text-gray-400 text-center mt-3 flex items-center justify-center gap-1">
      <span class="inline-block w-2 h-2 rounded-full bg-green-600"></span> Fecha límite de tarea
    </p>
  </div>

</main>

<script>
fetch('/views/header.html').then(r => r.text()).then(html => {
  const c = document.getElementById('header-container');
  c.innerHTML = html;
  c.querySelectorAll('script').forEach(s => {
    const ns = document.createElement('script');
    if (s.src) ns.src = s.src; else ns.textContent = s.textContent;
    document.body.appendChild(ns);
    s.remove();
  });
});

function dashboard() {
  return {
    userName: '...',
    fechaHoy: '',
    cursosActivos: '—',
    actividadesPendientes: '—',
    proximasEntregar: '—',
    cursos: [],
    tareasProximas: [],
    alertas: [],
    cargando: true,
    calendar: [],
    monthYear: '',
    currentDate: new Date(),
    eventDates: new Set(),

    async init() {
      this.setFechaHoy();
      this.renderCalendar();

      // Cargar perfil
      try {
        const r = await fetch('/api/perfil', { credentials: 'include' });
        if (!r.ok) { window.location.href = '/auth/login.html'; return; }
        const p = await r.json();
        this.userName = (p?.nombre || 'USUARIO').trim().split(' ')[0];
      } catch {}

      // Cargar cursos
      try {
        const r = await fetch('/api/miscursos', { credentials: 'include' });
        const d = await r.json();
        this.cursos = Array.isArray(d.data) ? d.data : [];
        this.cursosActivos = this.cursos.length;
      } catch {}

      // Cargar tareas y alertas en paralelo (alertas no bloquea el render)
      await this.cargarTareas();
      this.cargarAlertas();

      this.cargando = false;
    },

    async cargarAlertas() {
      try {
        const r = await fetch('/api/alertas', { credentials: 'include' });
        if (r.ok) {
          const d = await r.json();
          this.alertas = d.alertas || [];
        }
      } catch {}
    },

    setFechaHoy() {
      const now = new Date();
      this.fechaHoy = now.toLocaleDateString('es-EC', {
        weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
      }).replace(/^\w/, c => c.toUpperCase());
    },

    async cargarTareas() {
      const estudianteCursos = this.cursos.filter(c => c.rol !== 'profesor');
      if (!estudianteCursos.length) {
        this.actividadesPendientes = 0;
        this.proximasEntregar = 0;
        return;
      }

      const ahora = new Date();
      const en7dias = new Date(ahora.getTime() + 7 * 24 * 3600 * 1000);
      let pendientes = 0;
      let proximasList = [];

      await Promise.all(estudianteCursos.map(async (c) => {
        try {
          const r = await fetch(`/api/tareas?action=listar&curso_id=${c.id}`, { credentials: 'include' });
          if (!r.ok) return;
          const tareas = await r.json();
          const arr = Array.isArray(tareas) ? tareas : [];
          arr.forEach(t => {
            if (t.estado_calculado === 'pendiente') {
              pendientes++;
              const limite = t.due_at ? new Date(t.due_at) : null;
              const urgente = limite && limite <= en7dias;
              if (limite && limite >= ahora) {
                proximasList.push({
                  id: t.id, title: t.title || t.titulo,
                  cursoNombre: c.nombre, due_at: limite, urgente,
                  fechaStr: 'Límite: ' + limite.toLocaleDateString('es-EC', { day:'2-digit', month:'short' }),
                });
                // Marcar en calendario
                const key = `${limite.getFullYear()}-${limite.getMonth()}-${limite.getDate()}`;
                this.eventDates.add(key);
              }
            }
          });
        } catch {}
      }));

      proximasList.sort((a, b) => a.due_at - b.due_at);
      this.actividadesPendientes = pendientes;
      this.proximasEntregar = proximasList.filter(t => t.urgente).length;
      this.tareasProximas = proximasList;
      this.renderCalendar(); // re-render with events
    },

    renderCalendar() {
      const date = this.currentDate;
      const year = date.getFullYear();
      const month = date.getMonth();
      const today = new Date();
      const months = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
      this.monthYear = `${months[month]} ${year}`;

      const firstDay = new Date(year, month, 1).getDay();
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      let dayCount = 1;
      const cal = [];

      for (let w = 0; w < 6; w++) {
        const week = [];
        for (let d = 0; d < 7; d++) {
          if ((w === 0 && d < firstDay) || dayCount > daysInMonth) {
            week.push({ number: '', date: null, month, year, isToday: false, hasEvent: false });
          } else {
            const key = `${year}-${month}-${dayCount}`;
            week.push({
              number: dayCount, date: dayCount, month, year,
              isToday: dayCount === today.getDate() && month === today.getMonth() && year === today.getFullYear(),
              hasEvent: this.eventDates.has(key),
              eventTitle: this.eventDates.has(key) ? 'Tarea con entrega' : '',
            });
            dayCount++;
          }
        }
        cal.push(week);
        if (dayCount > daysInMonth) break;
      }
      this.calendar = cal;
    },

    prevMonth() {
      this.currentDate = new Date(this.currentDate.getFullYear(), this.currentDate.getMonth() - 1, 1);
      this.renderCalendar();
    },
    nextMonth() {
      this.currentDate = new Date(this.currentDate.getFullYear(), this.currentDate.getMonth() + 1, 1);
      this.renderCalendar();
    },
  };
}

document.addEventListener('alpine:init', () => Alpine.data('dashboard', dashboard));
</script>
</body>
</html>
